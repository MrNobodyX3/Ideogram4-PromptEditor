<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideogram4-PromptEditor</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Viewport lock */
    body, html {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    /* Premium dark blueprint layout pattern */
    .blueprint-bg {
      background-color: #020617; /* Slate-950 */
      background-image: radial-gradient(#1e293b 1.5px, transparent 1.5px); /* Slate-800 */
      background-size: 20px 20px;
    }
    /* Sleek scrollbar styling for sidebars */
    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #1e293b; /* Slate-800 */
      border-radius: 3px;
    }
    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: #334155; /* Slate-700 */
    }
    #bottom-palette::-webkit-scrollbar { display: none; }
    /* Professional multi-directional resize handles */
    .resize-handle {
      position: absolute;
      z-index: 50;
      pointer-events: auto;
    }
    .resize-handle-n  { cursor: ns-resize;    top: -4px;    left: 50%; transform: translateX(-50%); width: 24px; height: 8px; background: #6366f1; border-radius: 4px; }
    .resize-handle-s  { cursor: ns-resize;    bottom: -4px; left: 50%; transform: translateX(-50%); width: 24px; height: 8px; background: #6366f1; border-radius: 4px; }
    .resize-handle-e  { cursor: ew-resize;    right: -4px;  top: 50%;  transform: translateY(-50%); width: 8px;  height: 24px; background: #6366f1; border-radius: 4px; }
    .resize-handle-w  { cursor: ew-resize;    left: -4px;   top: 50%;  transform: translateY(-50%); width: 8px;  height: 24px; background: #6366f1; border-radius: 4px; }
    .resize-handle-nw { cursor: nwse-resize;  top: -5px;    left: -5px;  width: 10px; height: 10px; background: #6366f1; border-radius: 2px; }
    .resize-handle-ne { cursor: nesw-resize;  top: -5px;    right: -5px; width: 10px; height: 10px; background: #6366f1; border-radius: 2px; }
    .resize-handle-sw { cursor: nesw-resize;  bottom: -5px; left: -5px;  width: 10px; height: 10px; background: #6366f1; border-radius: 2px; }
    .resize-handle-se { cursor: nwse-resize;  bottom: -5px; right: -5px; width: 10px; height: 10px; background: #6366f1; border-radius: 2px; }
    /* Corner handle grab indicator */
    .resize-handle-se::after {
      content: ''; position: absolute; bottom: 1px; right: 1px;
      width: 6px; height: 6px;
      background: linear-gradient(135deg, transparent 40%, #fff 40%, #fff 55%, transparent 55%, transparent 70%, #fff 70%, #fff 80%, transparent 80%);
      opacity: 0.8;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 flex flex-col h-screen select-none">

  <!-- Header Section -->
  <header class="bg-slate-950 border-b border-slate-800 h-14 min-h-[56px] px-6 flex items-center justify-between z-30">
    <div class="flex items-center gap-3">
      <div class="p-1.5 bg-indigo-600 rounded-lg text-white shadow-lg shadow-indigo-600/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
        </svg>
      </div>
      <div>
        <h1 class="text-sm font-bold text-white tracking-wide">Ideogram4-PromptEditor</h1>
        <p class="text-[10px] text-slate-400">Strict JSON Prompt & Grid Modeler</p>
      </div>
    </div>

    <!-- Undo & Redo Header Controls -->
    <div class="flex items-center gap-4">
      <div class="flex items-center bg-slate-900 p-0.5 rounded-lg border border-slate-800 gap-0.5 shadow-inner">
        <button id="undo-btn" class="p-1.5 rounded hover:bg-slate-800 text-slate-300 disabled:opacity-30 disabled:hover:bg-transparent transition" title="Undo (Ctrl+Z)">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
          </svg>
        </button>
        <button id="redo-btn" class="p-1.5 rounded hover:bg-slate-800 text-slate-300 disabled:opacity-30 disabled:hover:bg-transparent transition" title="Redo (Ctrl+Y or Ctrl+Shift+Z)">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6" />
          </svg>
        </button>
      </div>

      <div class="h-4 w-[1px] bg-slate-800"></div>

      <!-- Preset Selector -->
      <div class="flex items-center gap-2">
        <span class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Preset:</span>
        <select id="preset-selector" class="bg-slate-900 border border-slate-800 text-indigo-400 text-xs font-bold rounded px-2 py-1 outline-none cursor-pointer focus:ring-1 focus:ring-indigo-500">
          <option value="clean"> Clean Canvas</option>
          <option value="cinematic"> Cinematic Landscape</option>
          <option value="minimalist"> Minimalist Product</option>
          <option value="fantasy"> Fantasy Dreamscape</option>
          <option value="vintage"> Vintage Nostalgia</option>
          <option value="tech"> Cyber Tech</option>
          <option value="nature"> Natural Serenity</option>
          <option value="editorial"> Bold Editorial</option>
          <option value="portrait"> Portrait Studio</option>
          <option disabled>──────────</option>
          <option value="ig-post"> Instagram Post (1:1)</option>
          <option value="ig-portrait"> Instagram Portrait (4:5)</option>
          <option value="ig-story"> Instagram Story / Reels (9:16)</option>
          <option value="twitter-post"> X / Twitter Post (16:9)</option>
          <option value="twitter-header"> X / Twitter Header (3:1)</option>
          <option value="fb-post"> Facebook Post (4:5)</option>
          <option value="fb-cover"> Facebook Cover (2:1)</option>
          <option value="linkedin-post"> LinkedIn Post (1:1)</option>
          <option value="linkedin-banner"> LinkedIn Banner (4:1)</option>
          <option value="yt-thumbnail"> YouTube Thumbnail (16:9)</option>
          <option value="tiktok"> TikTok / Shorts (9:16)</option>
          <option value="pinterest"> Pinterest Pin (2:3)</option>
        </select>
      </div>

      <div class="h-4 w-[1px] bg-slate-800"></div>

      <!-- Aspect Ratio Selection & Custom Input -->
      <div class="flex items-center gap-2">
        <span class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Ratio:</span>
        <select id="aspect-ratio-selector" class="bg-slate-900 border border-slate-800 text-slate-200 text-xs font-semibold rounded px-2 py-1 outline-none focus:ring-1 focus:ring-indigo-500">
          <option value="4:1">4:1 (Extra Wide)</option>
          <option value="3:1">3:1 (Banner Wide)</option>
          <option value="21:9">21:9 (Cinema)</option>
          <option value="2:1">2:1 (Panorama)</option>
          <option value="16:9">16:9 (Landscape)</option>
          <option value="16:10">16:10 (Wide Screen)</option>
          <option value="3:2">3:2 (Classic 35mm)</option>
          <option value="4:3">4:3 (Standard Photo)</option>
          <option value="5:4">5:4 (Large Format)</option>
          <option value="1:1">1:1 (Square)</option>
          <option value="4:5">4:5 (Standard Tall)</option>
          <option value="3:4" selected>3:4 (Magazine)</option>
          <option value="2:3">2:3 (Book Cover)</option>
          <option value="9:16">9:16 (Portrait)</option>
          <option value="1:2">1:2 (Tall Portrait)</option>
          <option value="custom">Custom...</option>
        </select>

        <!-- Custom Ratio Dimension Inputs -->
        <div id="custom-ratio-container" class="hidden flex items-center gap-1 bg-slate-900 border border-slate-800 rounded px-2 py-0.5 shadow-inner">
          <input type="number" id="custom-ratio-w" min="1" max="100" class="w-10 bg-transparent text-slate-200 text-xs font-bold outline-none text-center [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" placeholder="W" value="3">
          <span class="text-slate-600 text-xs font-bold">:</span>
          <input type="number" id="custom-ratio-h" min="1" max="100" class="w-10 bg-transparent text-slate-200 text-xs font-bold outline-none text-center [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" placeholder="H" value="4">
        </div>
      </div>
    </div>
  </header>

  <!-- Main Three-Column Workspace -->
  <main class="flex flex-1 w-full overflow-hidden bg-slate-950 h-[calc(100vh-56px)]">

    <!-- LEFT COLUMN: Workspace Inputs & Layers -->
    <section class="w-[360px] min-w-[360px] max-w-[360px] bg-slate-900 border-r border-slate-800 h-full flex flex-col z-20 shadow-sm">
      
      <!-- Interactive Tab Header buttons -->
      <div class="flex border-b border-slate-800 bg-slate-950">
        <button id="tab-global-btn" class="flex-1 py-3 text-xs font-bold border-b-2 border-indigo-600 text-indigo-400 bg-slate-900 transition flex items-center justify-center gap-2">
          <span>🎨</span> Global & Styles
        </button>
        <button id="tab-layers-btn" class="flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition flex items-center justify-center gap-2">
          <span>📂</span> Layers & Elements
        </button>
      </div>

      <!-- Scrollable Tab panels -->
      <div class="flex-1 overflow-y-auto p-4 custom-scroll space-y-4">
        
        <!-- Tab 1: Global Information -->
        <div id="tab-global-panel" class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">High Level Description</label>
            <textarea id="hld-input" rows="3" class="w-full text-xs bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-2 outline-none focus:border-indigo-500 transition leading-relaxed placeholder-slate-600" placeholder="Summarize the core layout composition..."></textarea>
          </div>

          <!-- Extended Dynamic Styles inputs -->
          <div id="extended-style-section" class="space-y-4 border-t border-slate-800 pt-4">
            <h3 class="text-xs font-bold text-slate-300">Aesthetic Styling Config</h3>
            
            <!-- Fixed Style Description Fields matching V4 schema -->
            <div id="style-fields-container" class="space-y-3">
              <!-- Rendered dynamically by JS: aesthetics, lighting, photo, art_style, medium -->
            </div>

            <!-- Global color array swatches -->
            <div class="border-t border-slate-800 pt-3 mt-4">
              <label class="block text-[9px] font-bold uppercase tracking-wider text-slate-500 mb-1.5">Color Palette Setup (max 16)</label>
              <div class="flex flex-wrap items-center gap-1.5">
                <div id="global-palette-container" class="flex flex-wrap gap-1.5"></div>
                <button id="add-global-color-btn" class="w-6 h-6 rounded-full border border-dashed border-slate-700 hover:border-indigo-500 flex items-center justify-center text-slate-400 hover:text-indigo-500 transition">+</button>
                <input type="color" id="global-color-picker">
              </div>
            </div>
          </div>

          <div class="border-t border-slate-800 pt-4">
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Background Details</label>
            <textarea id="background-input" rows="3" class="w-full text-xs bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-2 outline-none focus:border-indigo-500 transition leading-relaxed placeholder-slate-600" placeholder="Finished texture and details of background shell..."></textarea>
          </div>
        </div>

        <!-- Tab 2: Elements Lists Panel -->
        <div id="tab-layers-panel" class="hidden space-y-4">
          <div class="flex items-center justify-between">
            <span class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Render Hierarchy</span>
            <button id="tab-add-element-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-[10px] px-2.5 py-1.5 rounded transition flex items-center gap-1">
              <span>+</span> Add Box
            </button>
          </div>
          <div id="elements-list" class="space-y-3">
            <!-- Layers cards rendered via JS -->
          </div>
        </div>

      </div>
    </section>

    <!-- CENTER COLUMN: Visual Canvas Board -->
    <section class="flex-grow flex flex-col h-full blueprint-bg overflow-hidden relative">
      
      <!-- Top floating canvas navigation shortcuts -->
      <div class="absolute top-3 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-sm border border-slate-700/80 px-3 py-1.5 rounded-lg shadow-xl z-10 flex items-center gap-1.5">
        <button id="canvas-add-btn" class="flex items-center gap-1 px-2.5 py-1 text-[11px] font-bold text-slate-200 hover:text-white hover:bg-slate-800 rounded-md transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
          Layer
        </button>
        <div class="h-4 w-px bg-slate-700"></div>
        <button id="snap-toggle-btn" class="flex items-center gap-1 px-2.5 py-1 text-[11px] font-bold rounded-md transition" title="Toggle snap to grid">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16M6 4v16M12 4v16M18 4v16"/></svg>
          Snap
        </button>
        <div class="h-4 w-px bg-slate-700"></div>
        <div class="flex items-center">
          <span class="text-[9px] font-bold text-slate-500 uppercase tracking-wider mr-1">Align</span>
          <div class="flex bg-slate-950/60 rounded-md border border-slate-700/50 p-0.5">
            <button id="align-left-btn" class="align-btn p-1 rounded text-slate-400 hover:text-white hover:bg-slate-700 transition" title="Align left">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h10M4 18h13"/></svg>
            </button>
            <button id="align-center-h-btn" class="align-btn p-1 rounded text-slate-400 hover:text-white hover:bg-slate-700 transition" title="Center horizontally">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M8 12h8M4 18h16"/></svg>
            </button>
            <button id="align-right-btn" class="align-btn p-1 rounded text-slate-400 hover:text-white hover:bg-slate-700 transition" title="Align right">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M10 12h10M7 18h13"/></svg>
            </button>
          </div>
          <div class="w-px h-3 bg-slate-700 mx-1"></div>
          <div class="flex bg-slate-950/60 rounded-md border border-slate-700/50 p-0.5">
            <button id="align-top-btn" class="align-btn p-1 rounded text-slate-400 hover:text-white hover:bg-slate-700 transition" title="Align top">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 4h12M6 9h10M6 14h7"/></svg>
            </button>
            <button id="align-center-v-btn" class="align-btn p-1 rounded text-slate-400 hover:text-white hover:bg-slate-700 transition" title="Center vertically">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 4h12M6 12h10M6 20h12"/></svg>
            </button>
            <button id="align-bottom-btn" class="align-btn p-1 rounded text-slate-400 hover:text-white hover:bg-slate-700 transition" title="Align bottom">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 8h7M6 14h10M6 20h12"/></svg>
            </button>
          </div>
          <input id="align-offset-input" type="number" min="0" max="500" value="0" class="w-10 text-[10px] bg-slate-950 border border-slate-700 rounded px-1 py-0.5 text-slate-300 focus:border-indigo-500 outline-none text-center font-mono ml-1" title="Offset from canvas edge">
        </div>
        <div class="h-4 w-px bg-slate-700"></div>
        <button id="zoom-reset-btn" class="flex items-center gap-1 px-2 py-1 text-[11px] font-bold text-slate-400 hover:text-white hover:bg-slate-800 rounded-md transition" title="Reset zoom & pan (double-click canvas)">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/></svg>
          <span id="zoom-display">100%</span>
        </button>
      </div>

      <!-- Scaled Workspace Draft Board -->
      <div id="canvas-wrapper" class="w-full h-full relative overflow-hidden">
        <div id="canvas-area" class="bg-slate-900 shadow-2xl border border-slate-800 rounded-lg" style="position:absolute;left:0;top:0;transform-origin:0 0;"></div>
        <!-- Real-time dynamic scale monitor -->
        <div id="canvas-resolution" class="text-[10px] text-slate-500 font-mono select-none absolute bottom-3 left-1/2 -translate-x-1/2 z-10">0 × 0px</div>
      </div>

      <!-- Bottom center color palette tray (outside canvas-wrapper to avoid overflow clipping) -->
      <div id="bottom-palette" class="absolute bottom-16 left-1/2 -translate-x-1/2 z-20 bg-slate-900/85 backdrop-blur-sm border border-slate-700/70 rounded-xl px-2.5 py-2 shadow-xl flex items-center gap-1.5 pointer-events-auto w-max max-w-[90vw]">
        <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 shrink-0 pl-0.5">Palette</span>
        <div id="bottom-palette-container" class="grid gap-1.5"></div>
        <div class="relative w-6 h-6 shrink-0">
          <span class="absolute inset-0 rounded-full border border-dashed border-slate-600 flex items-center justify-center text-xs text-slate-400 pointer-events-none leading-none">+</span>
          <input type="color" id="bottom-palette-add" value="#6366f1" class="absolute inset-0 opacity-0 cursor-pointer border-none p-0">
        </div>
      </div>
    </section>

    <!-- RIGHT COLUMN: Output Generator -->
    <section class="w-[340px] min-w-[340px] max-w-[340px] bg-slate-900 border-l border-slate-800 h-full flex flex-col z-20 shadow-sm">
      <div class="p-4 border-b border-slate-800 flex items-center justify-between bg-slate-950">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
          <span class="text-xs font-bold uppercase tracking-wider text-slate-300">Generation Code</span>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-[10px] text-slate-400 flex items-center gap-1 cursor-pointer select-none">
            <input type="checkbox" id="minify-toggle" checked class="rounded border-slate-800 text-indigo-600 focus:ring-indigo-500 bg-slate-900">
            Minify
          </label>
        </div>
      </div>

      <div class="flex-1 p-4 flex flex-col gap-4 overflow-hidden">
        <textarea id="json-output" readonly class="flex-1 w-full text-[11px] font-mono bg-slate-950 text-emerald-400 border border-slate-850 rounded-xl p-4 focus:outline-none resize-none leading-relaxed custom-scroll" placeholder="Building strict JSON output..."></textarea>
        
        <button id="copy-btn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-indigo-950 transition flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
          </svg>
          Copy Code Configuration
        </button>

        <div class="grid grid-cols-4 gap-0 rounded-lg overflow-hidden border border-slate-700/50 bg-slate-800/30">
          <button id="save-state-btn" class="py-2 bg-transparent hover:bg-indigo-600/20 text-slate-400 hover:text-indigo-400 text-[10px] font-bold transition flex flex-col items-center justify-center gap-0.5 border-r border-slate-700/50 last:border-r-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            <span>Save</span>
          </button>
          <button id="load-state-btn" class="py-2 bg-transparent hover:bg-indigo-600/20 text-slate-400 hover:text-indigo-400 text-[10px] font-bold transition flex flex-col items-center justify-center gap-0.5 border-r border-slate-700/50 last:border-r-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5a2 2 0 00-2-2H9a2 2 0 00-2 2v5a2 2 0 01-2 2z"/></svg>
            <span>Load</span>
          </button>
          <button id="copy-state-btn" class="py-2 bg-transparent hover:bg-indigo-600/20 text-slate-400 hover:text-indigo-400 text-[10px] font-bold transition flex flex-col items-center justify-center gap-0.5 border-r border-slate-700/50 last:border-r-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            <span>Copy</span>
          </button>
          <button id="paste-state-btn" class="py-2 bg-transparent hover:bg-indigo-600/20 text-slate-400 hover:text-indigo-400 text-[10px] font-bold transition flex flex-col items-center justify-center gap-0.5">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span>Paste</span>
          </button>
        </div>

        <input type="file" id="load-state-input" accept=".json" class="hidden">
      </div>
    </section>

  </main>

  <!-- Interactive JavaScript Controller -->
  <script>
    'use strict';
    const state = {

      aspectRatio: '3:4',
      activeTab: 'global', // 'global' or 'layers'
      highLevelDescription: '',
      styleDescription: {
        fields: [
          {id: 'aesthetics', label: 'Aesthetics', value: ''},
          {id: 'lighting', label: 'Lighting', value: ''},
          {id: 'photo', label: 'Photo Style', value: ''},
          {id: 'art_style', label: 'Art Style', value: ''},
          {id: 'medium', label: 'Medium', value: ''},
        ],
        color_palette: []
      },
      background: '',
      elements: [],
      selectedId: null
    };

    // --- ZOOM / PAN ---
    let zoom = 1;
    let panX = 0;
    let panY = 0;
    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panStartPanX = 0;
    let panStartPanY = 0;

    function applyTransform() {
      const wrapperRect = DOM.canvasWrapper.getBoundingClientRect();
      const w = DOM.canvasArea.offsetWidth || 1;
      const h = DOM.canvasArea.offsetHeight || 1;
      const centerX = (wrapperRect.width - w * zoom) / 2;
      const centerY = (wrapperRect.height - h * zoom) / 2;
      DOM.canvasArea.style.transform = `translate(${centerX + panX}px, ${centerY + panY}px) scale(${zoom})`;
      updateZoomDisplay();
    }

    function updateZoomDisplay() {
      if (DOM.zoomDisplay) {
        DOM.zoomDisplay.textContent = `${Math.round(zoom * 100)}%`;
      }
      if (DOM.canvasResolution) {
        const w = DOM.canvasArea.offsetWidth;
        const h = DOM.canvasArea.offsetHeight;
        DOM.canvasResolution.textContent = `${Math.round(w)} × ${Math.round(h)}px  (${state.aspectRatio})  • ${Math.round(zoom * 100)}%`;
      }
    }

    function resetZoomPan() {
      zoom = 1;
      panX = 0;
      panY = 0;
      applyTransform();
    }

    // --- SNAPPING SYSTEM ---
    const SNAP_THRESHOLD = 15;
    let snapEnabled = true;
    let snapLines = [];

    function getSnapCandidates(excludeId) {
      const xCands = new Set([0, 500, 1000]);
      const yCands = new Set([0, 500, 1000]);
      state.elements.forEach(el => {
        if (el.id === excludeId) return;
        xCands.add(el.x1);
        xCands.add(el.x2);
        xCands.add(Math.round((el.x1 + el.x2) / 2));
        yCands.add(el.y1);
        yCands.add(el.y2);
        yCands.add(Math.round((el.y1 + el.y2) / 2));
      });
      return { x: xCands, y: yCands };
    }

    function snapEdgesOnAxis(positions, candidates, axis, threshold) {
      let bestOffset = 0;
      let bestDist = threshold;
      let snappedTo = null;

      for (const pos of positions) {
        for (const cand of candidates) {
          const dist = Math.abs(pos - cand);
          if (dist < bestDist) {
            bestDist = dist;
            bestOffset = cand - pos;
            snappedTo = cand;
          }
        }
      }

      if (bestOffset !== 0 && snappedTo !== null && snappedTo !== 0 && snappedTo !== 1000) {
        const exists = snapLines.some(l => l.axis === axis && l.value === snappedTo);
        if (!exists) {
          snapLines.push({ axis, value: snappedTo });
        }
      }

      return bestOffset;
    }

    function applyDragSnap(activeId, x1, y1, x2, y2) {
      if (!snapEnabled) return { x1, y1, x2, y2 };

      snapLines = [];
      const candidates = getSnapCandidates(activeId);
      const cx = Math.round((x1 + x2) / 2);
      const cy = Math.round((y1 + y2) / 2);

      const dx = snapEdgesOnAxis([x1, x2, cx], candidates.x, 'x', SNAP_THRESHOLD);
      const dy = snapEdgesOnAxis([y1, y2, cy], candidates.y, 'y', SNAP_THRESHOLD);

      return { x1: x1 + dx, y1: y1 + dy, x2: x2 + dx, y2: y2 + dy };
    }

    function applyResizeSnap(activeId, x1, y1, x2, y2, dir) {
      if (!snapEnabled) return { x1, y1, x2, y2 };

      snapLines = [];
      const candidates = getSnapCandidates(activeId);

      let dx = 0;
      let dy = 0;

      if (dir.includes('e') || dir.includes('w')) {
        const xPositions = [];
        if (dir.includes('e')) xPositions.push(x2);
        if (dir.includes('w')) xPositions.push(x1);
        dx = snapEdgesOnAxis(xPositions, candidates.x, 'x', SNAP_THRESHOLD);
      }
      if (dir.includes('n') || dir.includes('s')) {
        const yPositions = [];
        if (dir.includes('s')) yPositions.push(y2);
        if (dir.includes('n')) yPositions.push(y1);
        dy = snapEdgesOnAxis(yPositions, candidates.y, 'y', SNAP_THRESHOLD);
      }

      if (dir.includes('e')) x2 += dx;
      if (dir.includes('w')) x1 += dx;
      if (dir.includes('s')) y2 += dy;
      if (dir.includes('n')) y1 += dy;

      return { x1, y1, x2, y2 };
    }

    function applyDrawSnap(activeId, x1, y1, x2, y2) {
      if (!snapEnabled) return { x1, y1, x2, y2 };

      snapLines = [];
      const candidates = getSnapCandidates(activeId);

      const dx1 = snapEdgesOnAxis([x1], candidates.x, 'x', SNAP_THRESHOLD);
      const dy1 = snapEdgesOnAxis([y1], candidates.y, 'y', SNAP_THRESHOLD);
      const dx2 = snapEdgesOnAxis([x2], candidates.x, 'x', SNAP_THRESHOLD);
      const dy2 = snapEdgesOnAxis([y2], candidates.y, 'y', SNAP_THRESHOLD);

      x1 += dx1;
      y1 += dy1;
      x2 += dx2;
      y2 += dy2;

      if (x1 > x2) { const t = x1; x1 = x2; x2 = t; }
      if (y1 > y2) { const t = y1; y1 = y2; y2 = t; }

      return { x1, y1, x2, y2 };
    }

    let _snapContainer = null;

    function getSnapContainer() {
      if (!_snapContainer || !document.body.contains(_snapContainer)) {
        _snapContainer = document.createElement('div');
        _snapContainer.id = 'snap-guide-container';
        _snapContainer.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:100;';
        DOM.canvasArea.appendChild(_snapContainer);
      }
      return _snapContainer;
    }

    function renderSnapLines() {
      if (!DOM.canvasArea) return;
      const container = getSnapContainer();
      container.innerHTML = '';
      if (snapLines.length === 0) return;
      for (let i = 0; i < snapLines.length; i++) {
        const line = snapLines[i];
        const guide = document.createElement('div');
        guide.className = 'snap-guide-line';
        guide.style.cssText = 'position:absolute;pointer-events:none;background:#6366f1;opacity:0.8;';
        if (line.axis === 'x') {
          guide.style.left = `${line.value / 10}%`;
          guide.style.top = '0';
          guide.style.width = '1px';
          guide.style.height = '100%';
        } else {
          guide.style.top = `${line.value / 10}%`;
          guide.style.left = '0';
          guide.style.width = '100%';
          guide.style.height = '1px';
        }
        container.appendChild(guide);
      }
    }

    function clearSnapLines() {
      snapLines = [];
      if (_snapContainer && document.body.contains(_snapContainer)) {
        _snapContainer.innerHTML = '';
      }
    }

    function alignElement(dir) {
      const el = state.elements.find(item => item.id === state.selectedId);
      if (!el) return;

      const width = el.x2 - el.x1;
      const height = el.y2 - el.y1;
      const offset = Math.max(0, Math.min(500, parseInt(DOM.alignOffsetInput.value, 10) || 0));

      switch (dir) {
        case 'left':
          el.x1 = offset; el.x2 = offset + width; break;
        case 'center-h':
          el.x1 = Math.round((1000 - width) / 2); el.x2 = el.x1 + width; break;
        case 'right':
          el.x1 = 1000 - offset - width; el.x2 = 1000 - offset; break;
        case 'top':
          el.y1 = offset; el.y2 = offset + height; break;
        case 'center-v':
          el.y1 = Math.round((1000 - height) / 2); el.y2 = el.y1 + height; break;
        case 'bottom':
          el.y1 = 1000 - offset - height; el.y2 = 1000 - offset; break;
      }

      renderAll(true);
    }

    // Global DOM Namespace Reference Cache to prevent redundant execution bugs
    const DOM = {};

    // --- UNDO / REDO HISTORY CONTROLLER ---
    const history = {
      stack: [],
      index: -1,
      save() {
        if (this.index < this.stack.length - 1) {
          this.stack = this.stack.slice(0, this.index + 1);
        }
        const copy = JSON.parse(JSON.stringify({
          aspectRatio: state.aspectRatio,
          activeTab: state.activeTab,
          highLevelDescription: state.highLevelDescription,
          styleDescription: state.styleDescription,
          background: state.background,
          elements: state.elements,
          selectedId: state.selectedId
        }));
        this.stack.push(copy);
        this.index++;
        this.updateButtons();
      },
      undo() {
        if (this.index > 0) {
          this.index--;
          this.restore();
        }
      },
      redo() {
        if (this.index < this.stack.length - 1) {
          this.index++;
          this.restore();
        }
      },
      restore() {
        const snap = this.stack[this.index];
        state.aspectRatio = snap.aspectRatio;
        state.activeTab = snap.activeTab;
        state.highLevelDescription = snap.highLevelDescription;
        state.styleDescription = JSON.parse(JSON.stringify(snap.styleDescription));
        state.background = snap.background;
        state.elements = JSON.parse(JSON.stringify(snap.elements));
        state.selectedId = snap.selectedId;

        // Restore dynamic inputs inside panels using verified DOM namespace
        DOM.hldInput.value = state.highLevelDescription;
        DOM.backgroundInput.value = state.background;
        // Sync aspect ratio layout view elements cleanly
        syncAspectUI();

        syncActiveTab(false);
        resizeCanvas();
        renderAll(false);
        this.updateButtons();
      },
      updateButtons() {
        DOM.undoBtn.disabled = this.index <= 0;
        DOM.redoBtn.disabled = this.index >= this.stack.length - 1;
      }
    };

    let debounceTimer = null;
    function debouncedSave() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        history.save();
        generateJSON();
      }, 350);
    }

    function generateId() {
      return 'el_' + Math.random().toString(36).substr(2, 9);
    }

    const _fitCtx = document.createElement('canvas').getContext('2d');

    function calcTextScale(text, boxW, boxH) {
      if (!text) return { size: Math.min(boxW, boxH, 300), scaleX: 1, scaleY: 1 };
      const w = Math.max(20, boxW);
      const h = Math.max(20, boxH);
      const lines = text.split('\n');

      const baseSize = Math.max(8, Math.min(300, h / Math.max(1, lines.length)));

      _fitCtx.font = `${baseSize}px sans-serif`;
      let maxW = 0;
      for (let i = 0; i < lines.length; i++) {
        const m = _fitCtx.measureText(lines[i]);
        maxW = Math.max(maxW, m.width);
      }
      const natH = baseSize * Math.max(1, lines.length);

      return {
        size: baseSize,
        scaleX: w / Math.max(1, maxW),
        scaleY: h / Math.max(1, natH)
      };
    }

    // Dynamic ID parser converting element hooks into camelCase DOM Registry
    document.addEventListener("DOMContentLoaded", () => {
      const elementsToCache = [
        'aspect-ratio-selector', 'canvas-wrapper', 'canvas-area', 
        'elements-list', 'tab-add-element-btn', 'canvas-add-btn', 
        'hld-input', 'background-input', 'json-output', 'copy-btn', 'minify-toggle', 
        'preset-selector', 'tab-global-btn', 'tab-layers-btn', 'tab-global-panel', 
        'tab-layers-panel', 'extended-style-section', 'style-fields-container',
        'global-palette-container', 'global-color-picker', 'add-global-color-btn', 'undo-btn', 'redo-btn', 'canvas-resolution',
        'custom-ratio-container', 'custom-ratio-w', 'custom-ratio-h',
        'snap-toggle-btn',
        'align-left-btn', 'align-center-h-btn', 'align-right-btn',
        'align-top-btn', 'align-center-v-btn', 'align-bottom-btn',
        'align-offset-input',
        'zoom-reset-btn', 'zoom-display',
        'save-state-btn', 'load-state-btn', 'copy-state-btn', 'paste-state-btn', 'load-state-input'
      ];
      
      elementsToCache.forEach(id => {
        const camelCase = id.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
        DOM[camelCase] = document.getElementById(id);
      });

      init();
    });

    function toggleSnap() {
      snapEnabled = !snapEnabled;
      DOM.snapToggleBtn.classList.toggle('text-indigo-400', snapEnabled);
      DOM.snapToggleBtn.classList.toggle('text-slate-500', !snapEnabled);
      DOM.snapToggleBtn.classList.toggle('bg-indigo-600/20', snapEnabled);
      DOM.snapToggleBtn.classList.toggle('border', snapEnabled);
      DOM.snapToggleBtn.classList.toggle('border-indigo-800', snapEnabled);
      if (!snapEnabled) clearSnapLines();
    }

    function init() {
      DOM.hldInput.value = state.highLevelDescription;
      DOM.backgroundInput.value = state.background;

      migrateStyleDescription();

      // Initial snap button state
      DOM.snapToggleBtn.className = 'text-xs font-bold flex items-center gap-1.5 px-2 py-1 rounded bg-indigo-600/20 text-indigo-400 border border-indigo-800 transition';

      // Tab Selection Event Listeners
      DOM.tabGlobalBtn.addEventListener('click', () => { state.activeTab = 'global'; syncActiveTab(); });
      DOM.tabLayersBtn.addEventListener('click', () => { state.activeTab = 'layers'; syncActiveTab(); });

      DOM.aspectRatioSelector.addEventListener('change', handleAspectChange);
      DOM.minifyToggle.addEventListener('change', generateJSON);
      DOM.copyBtn.addEventListener('click', handleCopyJSON);

      // Custom Aspect inputs event listeners
      DOM.customRatioW.addEventListener('input', handleCustomRatioChange);
      DOM.customRatioH.addEventListener('input', handleCustomRatioChange);

      // Double Hookups on Box additions
      DOM.tabAddElementBtn.addEventListener('click', handleAddElement);
      DOM.canvasAddBtn.addEventListener('click', handleAddElement);
      DOM.presetSelector.addEventListener('change', handlePresetLoad);
      // Allow re-selecting the same preset to reset
      DOM.presetSelector.addEventListener('mousedown', function() {
        this.dataset.prevVal = this.value;
        this.value = '';
      });
      DOM.presetSelector.addEventListener('focusout', function() {
        if (!this.value && this.dataset.prevVal) {
          this.value = this.dataset.prevVal;
        }
      });
      DOM.snapToggleBtn.addEventListener('click', toggleSnap);

      DOM.alignLeftBtn.addEventListener('click', () => alignElement('left'));
      DOM.alignCenterHBtn.addEventListener('click', () => alignElement('center-h'));
      DOM.alignRightBtn.addEventListener('click', () => alignElement('right'));
      DOM.alignTopBtn.addEventListener('click', () => alignElement('top'));
      DOM.alignCenterVBtn.addEventListener('click', () => alignElement('center-v'));
      DOM.alignBottomBtn.addEventListener('click', () => alignElement('bottom'));

      DOM.hldInput.addEventListener('input', () => { state.highLevelDescription = DOM.hldInput.value; debouncedSave(); });
      DOM.backgroundInput.addEventListener('input', () => { state.background = DOM.backgroundInput.value; debouncedSave(); });

      DOM.addGlobalColorBtn.addEventListener('click', () => DOM.globalColorPicker.click());
      DOM.globalColorPicker.addEventListener('change', (e) => {
        if (state.styleDescription.color_palette.length < 16) {
          state.styleDescription.color_palette.push(e.target.value);
        }
        renderAll(true);
      });

      document.getElementById('bottom-palette-add')?.addEventListener('input', (e) => {
        if (state.styleDescription.color_palette.length < 16) {
          state.styleDescription.color_palette.push(e.target.value);
        }
        renderAll(true);
      });

      DOM.canvasArea.addEventListener('mousedown', handleCanvasMouseDown);
      DOM.canvasArea.addEventListener('mousedown', (e) => {
        if (e.button === 1) {
          e.preventDefault();
          isPanning = true;
          panStartX = e.clientX;
          panStartY = e.clientY;
          panStartPanX = panX;
          panStartPanY = panY;
          DOM.canvasArea.style.cursor = 'grabbing';
        }
      });
      DOM.canvasArea.addEventListener('dblclick', (e) => {
        if (e.target === DOM.canvasArea) resetZoomPan();
      });
      DOM.canvasWrapper.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (e.ctrlKey) {
          // Pinch-to-zoom (Mac trackpad / Magic Mouse) — zoom centered on viewport
          const delta = e.deltaY > 0 ? 0.92 : 1.08;
          const newZoom = Math.max(0.1, Math.min(10, zoom * delta));
          const wrapperRect = DOM.canvasWrapper.getBoundingClientRect();
          const viewCx = wrapperRect.width / 2;
          const viewCy = wrapperRect.height / 2;
          const w = DOM.canvasArea.offsetWidth || 1;
          const h = DOM.canvasArea.offsetHeight || 1;
          const centerX = (wrapperRect.width - w * zoom) / 2;
          const centerY = (wrapperRect.height - h * zoom) / 2;
          const canvasX = (viewCx - (centerX + panX)) / zoom;
          const canvasY = (viewCy - (centerY + panY)) / zoom;
          zoom = newZoom;
          const newCenterX = (wrapperRect.width - w * zoom) / 2;
          const newCenterY = (wrapperRect.height - h * zoom) / 2;
          panX = viewCx - newCenterX - canvasX * zoom;
          panY = viewCy - newCenterY - canvasY * zoom;
          applyTransform();
        } else {
          // Regular scroll → pan (two-finger trackpad, mouse wheel)
          panX -= e.deltaX;
          panY -= e.deltaY;
          applyTransform();
        }
      }, { passive: false });

      document.addEventListener('mousemove', (e) => {
        if (isPanning) {
          panX = panStartPanX + (e.clientX - panStartX);
          panY = panStartPanY + (e.clientY - panStartY);
          applyTransform();
        }
      });
      document.addEventListener('mouseup', (e) => {
        if (e.button === 1 && isPanning) {
          isPanning = false;
          DOM.canvasArea.style.cursor = '';
        }
      });

      DOM.zoomResetBtn.addEventListener('click', resetZoomPan);

      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(resizeCanvas, 100);
      });
      document.addEventListener('keydown', handleGlobalKeydown);

      DOM.undoBtn.addEventListener('click', () => history.undo());
      DOM.redoBtn.addEventListener('click', () => history.redo());

      DOM.saveStateBtn.addEventListener('click', handleSaveState);
      DOM.loadStateBtn.addEventListener('click', () => DOM.loadStateInput.click());
      DOM.loadStateInput.addEventListener('change', handleLoadState);
      DOM.copyStateBtn.addEventListener('click', handleCopyState);
      DOM.pasteStateBtn.addEventListener('click', handlePasteState);

      history.save();
      syncAspectUI();
      resizeCanvas();
      renderAll(false);
    }

    // Interactive Tab Controller logic
    function syncActiveTab(saveHistory = true) {
      if (state.activeTab === 'global') {
        DOM.tabGlobalPanel.classList.remove('hidden');
        DOM.tabLayersPanel.classList.add('hidden');
        DOM.tabGlobalBtn.className = 'flex-1 py-3 text-xs font-bold border-b-2 border-indigo-600 text-indigo-400 bg-slate-900 transition flex items-center justify-center gap-2';
        DOM.tabLayersBtn.className = 'flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition flex items-center justify-center gap-2';
      } else {
        DOM.tabLayersPanel.classList.remove('hidden');
        DOM.tabGlobalPanel.classList.add('hidden');
        DOM.tabLayersBtn.className = 'flex-1 py-3 text-xs font-bold border-b-2 border-indigo-600 text-indigo-400 bg-slate-900 transition flex items-center justify-center gap-2';
        DOM.tabGlobalBtn.className = 'flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition flex items-center justify-center gap-2';
      }
      if (saveHistory) {
        history.save();
      }
    }

    // Aspect scaling calculations for the Draft Board
    function resizeCanvas() {
      const rect = DOM.canvasWrapper.getBoundingClientRect();
      const padding = 32; 
      const maxW = rect.width - padding * 2;
      const maxH = rect.height - padding * 4; // Bounded for bottom info tag

      const [aspectW, aspectH] = state.aspectRatio.split(':').map(Number);
      const ratio = aspectW / aspectH;

      let w, h;
      if (maxW / maxH > ratio) {
        h = maxH;
        w = maxH * ratio;
      } else {
        w = maxW;
        h = maxW / ratio;
      }

      DOM.canvasArea.style.width = `${w}px`;
      DOM.canvasArea.style.height = `${h}px`;

      applyTransform();
    }

    // Aspect Ratio UI synchronization manager
    function syncAspectUI() {
      const standardRatios = ['4:1', '3:1', '21:9', '2:1', '16:9', '16:10', '3:2', '4:3', '5:4', '1:1', '4:5', '3:4', '2:3', '9:16', '1:2'];
      if (standardRatios.includes(state.aspectRatio)) {
        DOM.aspectRatioSelector.value = state.aspectRatio;
        DOM.customRatioContainer.classList.add('hidden');
      } else {
        DOM.aspectRatioSelector.value = 'custom';
        DOM.customRatioContainer.classList.remove('hidden');
        const [w, h] = state.aspectRatio.split(':');
        DOM.customRatioW.value = w || '3';
        DOM.customRatioH.value = h || '4';
      }
    }

    // Prompt Preset Engine — sets high-level description & background as actual prompts
    function handlePresetLoad(e) {
      const selection = e.target.value;
      if (!selection) return;

      if (selection === 'clean') {
        state.highLevelDescription = '';
        state.background = '';
        state.styleDescription = {
          fields: [
            {id: 'aesthetics', label: 'Aesthetics', value: ''},
            {id: 'lighting', label: 'Lighting', value: ''},
            {id: 'photo', label: 'Photo Style', value: ''},
            {id: 'art_style', label: 'Art Style', value: ''},
            {id: 'medium', label: 'Medium', value: ''},
          ],
          color_palette: []
        };
        state.elements = [];
        state.selectedId = null;

        DOM.hldInput.value = '';
        DOM.backgroundInput.value = '';

        syncAspectUI();
        resizeCanvas();
        renderAll(true);
        DOM.presetSelector.value = 'clean';
        return;
      }

      const prompts = {
        cinematic: {
          aspectRatio: '21:9',
          highLevelDescription: 'A dramatic cinematic landscape at golden hour with sweeping mountain silhouettes, moody cloud formations, and warm sunlight piercing through the mist. A lone figure stands on a ridge overlooking a vast valley.',
          background: 'A deep atmospheric gradient from warm amber at the horizon to rich purple-blue at the top, with volumetric god rays and soft haze layers creating depth.',
          styleDescription: {

    // Global Key Listener mapping (Delete / Backspace / CtrlZ / CtrlY / CtrlShiftZ)
    function handleGlobalKeydown(e) {
      const isZ = e.key.toLowerCase() === 'z';
      const isY = e.key.toLowerCase() === 'y';
      const isDelete = e.key === 'Delete' || e.key === 'Backspace';
      const hasMetaOrCtrl = e.ctrlKey || e.metaKey;

      // Don't intercept delete actions if currently focusing on input tags
      const activeTag = document.activeElement.tagName;
      const isTyping = activeTag === 'INPUT' || activeTag === 'TEXTAREA' || document.activeElement.isContentEditable;

      if (isTyping) {
        return; // Allow native text operations to execute
      }

      if (isDelete && state.selectedId) {
        e.preventDefault();
        state.elements = state.elements.filter(item => item.id !== state.selectedId);
        state.selectedId = null;
        renderAll(true);
      } else if (hasMetaOrCtrl && isZ) {
        e.preventDefault();
        if (e.shiftKey) {
          history.redo();
        } else {
          history.undo();
        }
      } else if (hasMetaOrCtrl && isY) {
        e.preventDefault();
        history.redo();
      }
    }

    // Toggle Custom inputs visibility depending on selector state
    function handleAspectChange(e) {
      const val = e.target.value;
      if (val === 'custom') {
        DOM.customRatioContainer.classList.remove('hidden');
        const w = DOM.customRatioW.value || '3';
        const h = DOM.customRatioH.value || '4';
        state.aspectRatio = `${w}:${h}`;
      } else {
        DOM.customRatioContainer.classList.add('hidden');
        state.aspectRatio = val;
      }
      resizeCanvas();
      history.save();
      generateJSON();
    }

    // Clamps, scales, and live-redraws custom numeric ratios on input typing
    let _ratioTimer = null;
    function handleCustomRatioChange() {
      let w = parseInt(DOM.customRatioW.value) || 1;
      let h = parseInt(DOM.customRatioH.value) || 1;
      
      if (w < 1) w = 1;
      if (h < 1) h = 1;
      DOM.customRatioW.value = w;
      DOM.customRatioH.value = h;

      state.aspectRatio = `${w}:${h}`;
      clearTimeout(_ratioTimer);
      _ratioTimer = setTimeout(resizeCanvas, 150);
      debouncedSave();
    }

    function renderAll(saveHistoryState = true) {
      if (saveHistoryState) {
        history.save();
      }
      renderGlobalPalette();
      renderStyleFields();
      renderFormElements();
      renderCanvasBoxes();
      renderBottomPalette();
      generateJSON();
    }

    function renderGlobalPalette() {
      DOM.globalPaletteContainer.innerHTML = '';
      state.styleDescription.color_palette.forEach((color, idx) => {
        const swatch = document.createElement('div');
        swatch.className = 'w-6 h-6 rounded-full border border-slate-700 relative group cursor-pointer shadow-md shadow-black/40 ring-1 ring-white/10 hover:border-slate-500 hover:ring-white/20 transition';
        swatch.style.backgroundColor = color;
        swatch.title = color;

        swatch.onclick = () => {
          state.styleDescription.color_palette.splice(idx, 1);
          renderAll(true);
        };

        const deleteTag = document.createElement('div');
        deleteTag.className = 'absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full w-3.5 h-3.5 flex items-center justify-center text-[8px] font-bold opacity-0 group-hover:opacity-100 transition-opacity';
        deleteTag.textContent = '×';
        swatch.appendChild(deleteTag);

        DOM.globalPaletteContainer.appendChild(swatch);
      });
    }

    function renderBottomPalette() {
      const container = document.getElementById('bottom-palette-container');
      if (!container) return;

      const seen = new Set();
      const ordered = [];
      state.styleDescription.color_palette.forEach(c => { if (!seen.has(c)) { seen.add(c); ordered.push(c); } });
      state.elements.forEach(el => (el.color_palette || []).forEach(c => { if (!seen.has(c)) { seen.add(c); ordered.push(c); } }));

      const selectedEl = state.elements.find(el => el.id === state.selectedId);
      const selectedColors = new Set(selectedEl?.color_palette || []);

      container.innerHTML = '';

      if (ordered.length === 0) {
        const empty = document.createElement('span');
        empty.className = 'text-[11px] text-slate-500 italic';
        empty.textContent = state.selectedId ? 'Box selected' : 'Canvas selected';
        container.style.gridTemplateColumns = '';
        container.appendChild(empty);
        return;
      }

      const cols = Math.min(ordered.length, 10);
      container.style.gridTemplateColumns = `repeat(${cols}, 24px)`;

      ordered.forEach(color => {
        const swatch = document.createElement('div');
        const isOnSelected = selectedColors.has(color);
        swatch.className = `w-6 h-6 rounded-full cursor-pointer transition-all duration-150 hover:scale-110 shrink-0 ${isOnSelected ? 'ring-2 ring-indigo-400 ring-offset-2 ring-offset-slate-900 shadow-lg shadow-indigo-500/20' : 'ring-1 ring-white/20 hover:ring-white/50 hover:shadow-md'}`;
        swatch.style.backgroundColor = color;
        swatch.title = color + (isOnSelected ? ' (click to remove)' : ' (click to add)');

        swatch.addEventListener('click', () => {
          if (state.selectedId) {
            const el = state.elements.find(item => item.id === state.selectedId);
            if (!el) return;
            if (el.color_palette.includes(color)) {
              el.color_palette = el.color_palette.filter(c => c !== color);
            } else {
              if (el.color_palette.length < 5) el.color_palette.push(color);
            }
          } else {
            const palette = state.styleDescription.color_palette;
            if (palette.includes(color)) {
              state.styleDescription.color_palette = palette.filter(c => c !== color);
            } else {
              if (palette.length < 16) palette.push(color);
            }
          }
          renderAll(true);
        });

        container.appendChild(swatch);
      });
    }
