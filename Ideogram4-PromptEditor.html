        card.querySelector('.text-val-input').addEventListener('input', (e) => {
          el.text = e.target.value;
          // Sync directly with canvas visual text element
          const inlineText = document.querySelector(`#box-${el.id} .inline-canvas-text`);
          if (inlineText) inlineText.textContent = el.text;
          debouncedSave();
        });

        card.querySelector('.desc-val-input').addEventListener('input', (e) => {
          el.desc = e.target.value;
          // Sync directly with canvas textbox if active on viewport
          const inlineDesc = document.querySelector(`#box-${el.id} .inline-canvas-desc`);
          if (inlineDesc) inlineDesc.value = el.desc;
          debouncedSave();
        });

        const imageUrlInput = card.querySelector('.image-url-input');
        const imageFileInput = card.querySelector('.image-file-input');
        const imageClearBtn = card.querySelector('.image-clear-btn');

        if (imageUrlInput) {
          imageUrlInput.addEventListener('input', (e) => {
            el.imageUrl = e.target.value;
            const boxEl = document.getElementById(`box-${el.id}`);
            if (boxEl) {
              let imgEl = boxEl.querySelector('.ref-image');
              if (el.imageUrl) {
                if (!imgEl) {
                  imgEl = document.createElement('img');
                  imgEl.className = 'ref-image';
                  imgEl.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;pointer-events:none;z-index:0;';
                  imgEl.draggable = false;
                  boxEl.insertBefore(imgEl, boxEl.firstChild);
                }
                imgEl.src = el.imageUrl;
              } else if (imgEl) {
                imgEl.remove();
              }
            }
            debouncedSave();
          });
        }

        if (imageFileInput) {
          imageFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
              el.imageUrl = ev.target.result;
              renderAll(true);
            };
            reader.readAsDataURL(file);
            imageFileInput.value = '';
          });
        }

        if (imageClearBtn) {
          imageClearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            el.imageUrl = '';
            renderAll(true);
          });
        }

        card.querySelector('.delete-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          state.elements = state.elements.filter(item => item.id !== el.id);
          if (state.selectedId === el.id) state.selectedId = null;
          renderAll();
        });

        const swatchesContainer = card.querySelector('.element-swatches-container');
        const colorPickerIn = card.querySelector('.layer-color-picker');

        (el.color_palette || []).forEach((color, idx) => {
          const circle = document.createElement('div');
          circle.className = 'w-5 h-5 rounded-full border border-slate-700 relative group cursor-pointer shadow-md shadow-black/40 ring-1 ring-white/10 hover:border-slate-500 hover:ring-white/20 transition';
          circle.style.backgroundColor = color;
          
          circle.onclick = (ev) => {
            ev.stopPropagation();
            el.color_palette.splice(idx, 1);
            renderAll();
          };

          const delBadge = document.createElement('div');
          delBadge.className = 'absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-3 h-3 flex items-center justify-center text-[7px] font-bold opacity-0 group-hover:opacity-100 transition-opacity';
          delBadge.textContent = '×';
          circle.appendChild(delBadge);

          swatchesContainer.appendChild(circle);
        });

        colorPickerIn.addEventListener('change', () => {
          if (el.color_palette.length < 5) {
            el.color_palette.push(colorPickerIn.value);
          }
          renderAll();
        });

        DOM.elementsList.appendChild(card);
      });
    }

    function renderCanvasBoxes() {
      DOM.canvasArea.innerHTML = '';

      // Render a polished Empty State graphic when canvas contains zero active layout elements
      if (state.elements.length === 0) {
        const placeholder = document.createElement('div');
        placeholder.className = 'absolute inset-0 flex flex-col items-center justify-center p-6 text-center text-slate-500 pointer-events-none select-none';
        placeholder.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 mb-2 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span class="text-xs font-semibold text-slate-400">Canvas is empty</span>
          <span class="text-[10px] text-slate-600 mt-1 max-w-[200px] leading-relaxed">Click & drag here to draw a new zone, or load a prompt preset above.</span>
        `;
        DOM.canvasArea.appendChild(placeholder);
        return;
      }

      state.elements.forEach(el => {
        const isSelected = el.id === state.selectedId;
        const box = document.createElement('div');
        box.id = `box-${el.id}`;
        box.className = `absolute border ${isSelected ? 'border-indigo-500 bg-indigo-500/10 z-20 shadow-lg' : 'border-slate-700 bg-slate-900/40 z-10 hover:border-slate-500'}`;
        
        box.style.top = `${el.y1 / 10}%`;
        box.style.left = `${el.x1 / 10}%`;
        box.style.width = `${(el.x2 - el.x1) / 10}%`;
        box.style.height = `${(el.y2 - el.y1) / 10}%`;

        // Tag label for non-text elements
        if (el.type !== 'text') {
          const tag = document.createElement('div');
          tag.className = `absolute top-1 left-1 px-1 py-0.5 rounded text-[8px] font-mono font-bold select-none pointer-events-none ${isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-850 text-slate-300'}`;
          tag.innerHTML = `<span class="coords-display opacity-60 text-[7px]">${el.type.toUpperCase()} ${el.y1},${el.x1}</span>`;
          box.appendChild(tag);
        }

        // Visual text representation for text-type elements — always visible, fits to box
        if (el.type === 'text') {
          const cw = DOM.canvasArea.clientWidth;
          const ch = DOM.canvasArea.clientHeight;
          const boxW = cw * (el.x2 - el.x1) / 1000;
          const boxH = ch * (el.y2 - el.y1) / 1000;
          const { size, scaleX, scaleY } = calcTextScale(el.text, boxW, boxH);
          const textWrap = document.createElement('div');
          textWrap.className = 'absolute inset-0';
          textWrap.style.cssText = 'display:flex;align-items:flex-start;justify-content:flex-start;overflow:hidden;pointer-events:none;';
          const textEl = document.createElement('div');
          textEl.className = 'inline-canvas-text';
          textEl.style.cssText = `white-space:pre;color:white;font-size:${size}px;line-height:1;font-family:sans-serif;display:inline-block;transform-origin:top left;transform:scale(${scaleX},${scaleY});`;
          textEl.textContent = el.text || '';
          textWrap.appendChild(textEl);
          box.appendChild(textWrap);
        }

        // Reference image overlay for obj elements (visual only, excluded from JSON output)
        if (el.imageUrl && el.type !== 'text') {
          const img = document.createElement('img');
          img.className = 'ref-image';
          img.src = el.imageUrl;
          img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;pointer-events:none;z-index:0;';
          img.draggable = false;
          box.insertBefore(img, box.firstChild);
        }

        // --- INLINE CANVAS EDITABLE INFORMATION ---
        const widthVal = el.x2 - el.x1;
        const heightVal = el.y2 - el.y1;
        const isLargeEnough = widthVal >= 180 && heightVal >= 120;

        if (isLargeEnough && el.type !== 'text') {
          const inlineForm = document.createElement('div');
          inlineForm.className = 'absolute bottom-0 left-0 right-0 p-1.5 flex flex-col gap-0.5 overflow-hidden pointer-events-auto';
          inlineForm.style.backgroundColor = 'rgba(15, 23, 42, 0.7)';

          const typeRow = document.createElement('div');
          typeRow.className = 'flex items-center gap-1';
          const objBtn = document.createElement('button');
          objBtn.className = `px-1.5 py-0.5 rounded text-[9px] font-bold leading-none transition ${el.type === 'obj' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-slate-200'}`;
          objBtn.textContent = 'OBJ';
          const textBtn = document.createElement('button');
          textBtn.className = `px-1.5 py-0.5 rounded text-[9px] font-bold leading-none transition ${el.type === 'text' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-slate-200'}`;
          textBtn.textContent = 'TEXT';
          objBtn.addEventListener('mousedown', (ev) => {
            ev.stopPropagation();
            if (el.type !== 'obj') { el.type = 'obj'; renderAll(true); }
          });
          textBtn.addEventListener('mousedown', (ev) => {
            ev.stopPropagation();
            if (el.type !== 'text') { el.type = 'text'; renderAll(true); }
          });
          typeRow.appendChild(objBtn);
          typeRow.appendChild(textBtn);

          inlineForm.innerHTML = `
            <textarea class="inline-canvas-desc w-full text-[10px] bg-slate-950 border border-slate-800 rounded px-1.5 py-0.5 text-slate-100 focus:border-indigo-500 outline-none resize-none leading-tight custom-scroll" placeholder="Desc..." rows="1">${el.desc || ''}</textarea>
          `;

          inlineForm.insertBefore(typeRow, inlineForm.firstChild);
          const colorRow = document.createElement('div');
          colorRow.className = 'flex items-center gap-1.5';
          (el.color_palette || []).forEach((color, idx) => {
            const dot = document.createElement('div');
            dot.className = 'w-3 h-3 rounded-full border border-white/20 shadow-sm cursor-pointer hover:ring-1 hover:ring-red-400/60 transition';
            dot.style.backgroundColor = color;
            dot.addEventListener('mousedown', (ev) => {
              ev.stopPropagation();
              el.color_palette.splice(idx, 1);
              renderAll(true);
            });
            colorRow.appendChild(dot);
          });
          if ((el.color_palette || []).length < 5) {
            const addWrap = document.createElement('div');
            addWrap.className = 'relative w-3.5 h-3.5';
            addWrap.innerHTML = '<span class="absolute inset-0 rounded-full border border-dashed border-slate-600 flex items-center justify-center text-[7px] text-slate-400 pointer-events-none">+</span>';
            const colorInput = document.createElement('input');
            colorInput.type = 'color';
            colorInput.style.cssText = 'position:absolute;inset:0;opacity:0;cursor:pointer;border:none;padding:0';
            colorInput.addEventListener('mousedown', (ev) => { ev.stopPropagation(); });
            colorInput.addEventListener('change', () => {
              if (el.color_palette.length < 5) {
                el.color_palette.push(colorInput.value);
                renderAll(true);
              }
            });
            addWrap.appendChild(colorInput);
            colorRow.appendChild(addWrap);
          }
          inlineForm.appendChild(colorRow);

          // Bind mouse event limits to ensure inline input typing doesn't drag the layout canvas elements
          const stopEvents = (ev) => { 
            ev.stopPropagation(); 
            selectElement(el.id);
          };
          
          const descIn = inlineForm.querySelector('.inline-canvas-desc');

          if (descIn) {
            descIn.addEventListener('mousedown', stopEvents);
            descIn.addEventListener('keydown', stopEvents);
            descIn.addEventListener('input', (e) => {
              el.desc = e.target.value;
              const sidebarDesc = document.querySelector(`#form-${el.id} .desc-val-input`);
              if (sidebarDesc) sidebarDesc.value = el.desc;
              debouncedSave();
            });
          }

          box.appendChild(inlineForm);
        }

        if (isSelected) {
          ['n','s','e','w','nw','ne','se','sw'].forEach(dir => {
            const rh = document.createElement('div');
            rh.className = `resize-handle resize-handle-${dir}`;
            rh.dataset.dir = dir;
            rh.addEventListener('mousedown', (e) => handleResizeMouseDown(e, el.id));
            box.appendChild(rh);
          });
        }

        box.addEventListener('mousedown', (e) => {
          if (e.target.closest('.resize-handle')) return;
          handleDragMouseDown(e, el.id);
        });

        DOM.canvasArea.appendChild(box);
      });
    }

    function selectElement(id) {
      if (state.selectedId === id) return;
      const prevId = state.selectedId;
      state.selectedId = id;

      // Toggle previous selection off
      if (prevId) {
        const prevBox = document.getElementById(`box-${prevId}`);
        if (prevBox) {
          prevBox.className = 'absolute border border-slate-700 bg-slate-900/40 z-10 hover:border-slate-500';
          prevBox.querySelectorAll('.resize-handle').forEach(rh => rh.remove());
        }
        const prevForm = document.getElementById(`form-${prevId}`);
        if (prevForm) {
          prevForm.className = 'p-4 rounded-xl border transition border-slate-800 bg-slate-950/50';
        }
      }

      // Highlight new selection
      const newBox = document.getElementById(`box-${id}`);
      if (newBox) {
        newBox.className = 'absolute border border-indigo-500 bg-indigo-500/10 z-20 shadow-lg';
        if (!newBox.querySelector('.resize-handle')) {
          ['n','s','e','w','nw','ne','se','sw'].forEach(dir => {
            const rh = document.createElement('div');
            rh.className = `resize-handle resize-handle-${dir}`;
            rh.dataset.dir = dir;
            rh.addEventListener('mousedown', (e) => handleResizeMouseDown(e, id));
            newBox.appendChild(rh);
          });
        }
      }

      const newForm = document.getElementById(`form-${id}`);
      if (newForm) {
        newForm.className = 'p-4 rounded-xl border transition border-indigo-500 bg-indigo-500/10 ring-1 ring-indigo-500';
        newForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      if (state.activeTab !== 'layers') {
        state.activeTab = 'layers';
        syncActiveTab(false);
      }

      renderBottomPalette();
    }

    let activeAction = null; 
    let activeDirection = null; // for resize: 'n','s','e','w','ne','nw','se','sw'
    let currentElementId = null;
    let initialX = 0, initialY = 0;
    let rectBounds = null;
    let initialBoxCoords = {};
    let _rafPending = false;
    let _rafId = null;
    let _dragElId = null;

    function handleCanvasMouseDown(e) {
      if (e.target !== DOM.canvasArea) return; 
      if (e.button !== 0) return;
      e.preventDefault();

      activeAction = 'drawing';
      rectBounds = DOM.canvasArea.getBoundingClientRect();
      
      const clickX = ((e.clientX - rectBounds.left) / rectBounds.width) * 1000;
      const clickY = ((e.clientY - rectBounds.top) / rectBounds.height) * 1000;

      const newId = generateId();
      const newEl = {
        id: newId,
        type: 'obj',
        text: '',
        desc: 'Custom drag drawn element',
        y1: Math.round(clickY),
        x1: Math.round(clickX),
        y2: Math.round(clickY),
        x2: Math.round(clickX),
        color_palette: []
      };

      state.elements.push(newEl);
      state.selectedId = newId;
      currentElementId = newId;
      initialBoxCoords = { x1: newEl.x1, y1: newEl.y1, x2: newEl.x2, y2: newEl.y2 };

      renderAll();

      document.addEventListener('mousemove', handleGlobalMouseMove);
      document.addEventListener('mouseup', handleGlobalMouseUp);
    }

    function handleDragMouseDown(e, id) {
      e.preventDefault();
      e.stopPropagation();
      selectElement(id);

      activeAction = 'dragging';
      currentElementId = id;
      rectBounds = DOM.canvasArea.getBoundingClientRect();

      initialX = e.clientX;
      initialY = e.clientY;

      const el = state.elements.find(item => item.id === id);
      initialBoxCoords = { ...el };

      document.addEventListener('mousemove', handleGlobalMouseMove);
      document.addEventListener('mouseup', handleGlobalMouseUp);
    }

    function handleResizeMouseDown(e, id) {
      e.preventDefault();
      e.stopPropagation();

      activeAction = 'resizing';
      activeDirection = e.target.dataset.dir || 'se';
      currentElementId = id;
      rectBounds = DOM.canvasArea.getBoundingClientRect();

      initialX = e.clientX;
      initialY = e.clientY;

      const el = state.elements.find(item => item.id === id);
      initialBoxCoords = { ...el };

      document.addEventListener('mousemove', handleGlobalMouseMove);
      document.addEventListener('mouseup', handleGlobalMouseUp);
    }

    function handleGlobalMouseMove(e) {
      if (!activeAction || !currentElementId) return;

      const el = state.elements.find(item => item.id === currentElementId);
      if (!el) return;

      const deltaX = ((e.clientX - initialX) / rectBounds.width) * 1000;
      const deltaY = ((e.clientY - initialY) / rectBounds.height) * 1000;

      if (activeAction === 'drawing') {
        const mouseX = ((e.clientX - rectBounds.left) / rectBounds.width) * 1000;
        const mouseY = ((e.clientY - rectBounds.top) / rectBounds.height) * 1000;

        const anchorX = initialBoxCoords.x1;
        const anchorY = initialBoxCoords.y1;

        let newX1 = Math.round(Math.min(anchorX, mouseX));
        let newY1 = Math.round(Math.min(anchorY, mouseY));
        let newX2 = Math.round(Math.max(anchorX, mouseX));
        let newY2 = Math.round(Math.max(anchorY, mouseY));

        if (snapEnabled) {
          const snapped = applyDrawSnap(el.id, newX1, newY1, newX2, newY2);
          newX1 = snapped.x1; newY1 = snapped.y1;
          newX2 = snapped.x2; newY2 = snapped.y2;
        }

        el.x1 = Math.max(0, Math.min(1000, newX1));
        el.y1 = Math.max(0, Math.min(1000, newY1));
        el.x2 = Math.max(0, Math.min(1000, newX2));
        el.y2 = Math.max(0, Math.min(1000, newY2));
      } 
      else if (activeAction === 'dragging') {
        const width = initialBoxCoords.x2 - initialBoxCoords.x1;
        const height = initialBoxCoords.y2 - initialBoxCoords.y1;

        let newX1 = Math.round(initialBoxCoords.x1 + deltaX);
        let newY1 = Math.round(initialBoxCoords.y1 + deltaY);

        if (snapEnabled) {
          const snapped = applyDragSnap(el.id, newX1, newY1, newX1 + width, newY1 + height);
          newX1 = snapped.x1;
          newY1 = snapped.y1;
        }

        if (newX1 < 0) newX1 = 0;
        if (newY1 < 0) newY1 = 0;
        if (newX1 + width > 1000) newX1 = 1000 - width;
        if (newY1 + height > 1000) newY1 = 1000 - height;

        el.x1 = newX1;
        el.y1 = newY1;
        el.x2 = newX1 + width;
        el.y2 = newY1 + height;
      } 
      else if (activeAction === 'resizing') {
        const dir = activeDirection;
        let {x1, y1, x2, y2} = initialBoxCoords;
        const minSize = 30;

        if (dir.includes('e')) x2 = Math.round(initialBoxCoords.x2 + deltaX);
        if (dir.includes('w')) x1 = Math.round(initialBoxCoords.x1 + deltaX);
        if (dir.includes('s')) y2 = Math.round(initialBoxCoords.y2 + deltaY);
        if (dir.includes('n')) y1 = Math.round(initialBoxCoords.y1 + deltaY);

        if (snapEnabled) {
          const snapped = applyResizeSnap(el.id, x1, y1, x2, y2, dir);
          x1 = snapped.x1; y1 = snapped.y1; x2 = snapped.x2; y2 = snapped.y2;
        }

        if (x2 - x1 < minSize) {
          if (dir.includes('e')) x2 = x1 + minSize;
          else x1 = x2 - minSize;
        }
        if (y2 - y1 < minSize) {
          if (dir.includes('s')) y2 = y1 + minSize;
          else y1 = y2 - minSize;
        }
        x1 = Math.max(0, Math.min(1000, x1));
        y1 = Math.max(0, Math.min(1000, y1));
        x2 = Math.max(0, Math.min(1000, x2));
        y2 = Math.max(0, Math.min(1000, y2));
        if (x2 - x1 < minSize) {
          if (dir.includes('e')) x2 = Math.min(1000, x1 + minSize);
          else x1 = Math.max(0, x2 - minSize);
        }
        if (y2 - y1 < minSize) {
          if (dir.includes('s')) y2 = Math.min(1000, y1 + minSize);
          else y1 = Math.max(0, y2 - minSize);
        }

        el.x1 = x1; el.y1 = y1; el.x2 = x2; el.y2 = y2;
      }

      // Batch DOM updates with requestAnimationFrame
      _dragElId = el.id;
      if (!_rafPending) {
        _rafPending = true;
        _rafId = requestAnimationFrame(() => {
          _rafPending = false;
          _rafId = null;
          const targetId = _dragElId;
          const targetEl = state.elements.find(item => item.id === targetId);
          if (!targetEl) return;

          renderSnapLines();

          const visualBox = document.getElementById(`box-${targetEl.id}`);
          if (visualBox) {
            visualBox.style.top = `${targetEl.y1 / 10}%`;
            visualBox.style.left = `${targetEl.x1 / 10}%`;
            visualBox.style.width = `${(targetEl.x2 - targetEl.x1) / 10}%`;
            visualBox.style.height = `${(targetEl.y2 - targetEl.y1) / 10}%`;

            if (targetEl.type === 'text') {
              const textEl = visualBox.querySelector('.inline-canvas-text');
              if (textEl) {
                const cw = DOM.canvasArea.clientWidth;
                const ch = DOM.canvasArea.clientHeight;
                const bW = cw * (targetEl.x2 - targetEl.x1) / 1000;
                const bH = ch * (targetEl.y2 - targetEl.y1) / 1000;
                const { size, scaleX, scaleY } = calcTextScale(targetEl.text, bW, bH);
                textEl.style.fontSize = size + 'px';
                textEl.style.transform = `scale(${scaleX},${scaleY})`;
              }
            }
          }
        });
      }
    }

    function handleGlobalMouseUp() {
      clearSnapLines();
      let isChanged = false;
      if (activeAction === 'drawing') {
        const el = state.elements.find(item => item.id === currentElementId);
        if (el && (el.x2 - el.x1 < 10 || el.y2 - el.y1 < 10)) {
          state.elements = state.elements.filter(item => item.id !== el.id);
          state.selectedId = null;
        } else {
          isChanged = true;
          state.activeTab = 'layers';
          syncActiveTab(false);
        }
      } else if (activeAction === 'dragging' || activeAction === 'resizing') {
        const el = state.elements.find(item => item.id === currentElementId);
        if (el && (el.x1 !== initialBoxCoords.x1 || el.y1 !== initialBoxCoords.y1 || el.x2 !== initialBoxCoords.x2 || el.y2 !== initialBoxCoords.y2)) {
          isChanged = true;
        }
      }

      if (_rafId) {
        cancelAnimationFrame(_rafId);
        _rafId = null;
      }
      _rafPending = false;
      activeAction = null;
      activeDirection = null;
      currentElementId = null;
      document.removeEventListener('mousemove', handleGlobalMouseMove);
      document.removeEventListener('mouseup', handleGlobalMouseUp);
      
      renderAll(isChanged); 
    }

    function generateJSON() {
      function buildElement(el) {
        const e = { type: el.type };
        if (el.type === 'text') {
          e.text = el.text || '';
        }
        e.bbox = [el.y1, el.x1, el.y2, el.x2];
        e.desc = el.desc;
        if (el.color_palette && el.color_palette.length > 0) {
          e.color_palette = el.color_palette;
        }
        return e;
      }

      const fieldVals = {};
      if (state.styleDescription.fields) {
        state.styleDescription.fields.forEach(f => { fieldVals[f.id] = f.value; });
      } else {
        STYLE_FIELDS.forEach(sf => { fieldVals[sf.key] = state.styleDescription[sf.key] || ''; });
      }
      const sd = { ...fieldVals };
      sd.color_palette = state.styleDescription.color_palette;

      const outputStructure = {
        high_level_description: state.highLevelDescription,
        style_description: sd,
        compositional_deconstruction: {
          background: state.background,
          elements: state.elements.map(buildElement)
        }
      };

      const isMinified = DOM.minifyToggle.checked;
      DOM.jsonOutput.value = isMinified 
        ? JSON.stringify(outputStructure) 
        : JSON.stringify(outputStructure, null, 2);
    }

    function handleCopyJSON() {
      DOM.jsonOutput.select();
      navigator.clipboard.writeText(DOM.jsonOutput.value)
        .then(() => {
          const originalText = DOM.copyBtn.innerHTML;
          DOM.copyBtn.innerHTML = '✓ Copied Configuration';
          DOM.copyBtn.classList.replace('bg-indigo-600', 'bg-green-600');
          setTimeout(() => {
            DOM.copyBtn.innerHTML = originalText;
            DOM.copyBtn.classList.replace('bg-green-600', 'bg-indigo-600');
          }, 2000);
        })
        .catch(() => {
          DOM.jsonOutput.select();
          document.execCommand('copy');
        });
    }

    function serializeState() {
      return {
        aspectRatio: state.aspectRatio,
        activeTab: state.activeTab,
        highLevelDescription: state.highLevelDescription,
        styleDescription: state.styleDescription,
        background: state.background,
        elements: state.elements,
        selectedId: state.selectedId
      };
    }

    function restoreState(data) {
      state.aspectRatio = data.aspectRatio || '3:4';
      state.activeTab = data.activeTab || 'global';
      state.highLevelDescription = data.highLevelDescription || '';
      state.styleDescription = JSON.parse(JSON.stringify(data.styleDescription || { fields: [], color_palette: [] }));
      state.background = data.background || '';
      state.elements = (data.elements || []).map(el => ({ ...el }));
      state.selectedId = data.selectedId || null;

      DOM.hldInput.value = state.highLevelDescription;
      DOM.backgroundInput.value = state.background;

      syncAspectUI();
      resizeCanvas();
      renderAll(true);
    }

    function flashBtn(btn, text, duration = 1500) {
      const originalHTML = btn.innerHTML;
      btn.innerHTML = text;
      btn.classList.replace('bg-transparent', 'bg-green-700');
      btn.classList.add('text-white');
      setTimeout(() => {
        btn.innerHTML = originalHTML;
        btn.classList.replace('bg-green-700', 'bg-transparent');
        btn.classList.remove('text-white');
      }, duration);
    }

    async function handleSaveState() {
      const data = serializeState();
      const content = JSON.stringify(data, null, 2);
      const blob = new Blob([content], { type: 'application/json' });

      if ('showSaveFilePicker' in window) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: 'ideogram-state.json',
            types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
          });
          const writable = await handle.createWritable();
          await writable.write(content);
          await writable.close();
          flashBtn(DOM.saveStateBtn, '✓ Saved');
          return;
        } catch (_) {}
      }

      const name = prompt('Filename:', 'ideogram-state.json');
      if (!name) return;
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
      flashBtn(DOM.saveStateBtn, '✓ Saved');
    }

    function handleLoadState(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          restoreState(data);
          flashBtn(DOM.loadStateBtn, '✓ Loaded');
        } catch (err) {
          flashBtn(DOM.loadStateBtn, '✗ Invalid JSON');
        }
      };
      reader.readAsText(file);
      DOM.loadStateInput.value = '';
    }

    function handleCopyState() {
      const data = serializeState();
      navigator.clipboard.writeText(JSON.stringify(data, null, 2))
        .then(() => {
          flashBtn(DOM.copyStateBtn, '✓ Copied');
        })
        .catch(() => {
          flashBtn(DOM.copyStateBtn, '✗ Failed');
        });
    }

    function restoreFromGenerated(data) {
      state.highLevelDescription = data.high_level_description || '';
      state.background = data.compositional_deconstruction?.background || '';
      state.elements = (data.compositional_deconstruction?.elements || []).map(el => ({
        id: 'el_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        type: el.type || 'obj',
        text: el.text || '',
        desc: el.desc || '',
        y1: el.bbox?.[0] || 0,
        x1: el.bbox?.[1] || 0,
        y2: el.bbox?.[2] || 500,
        x2: el.bbox?.[3] || 500,
        color_palette: el.color_palette || [],
        imageUrl: ''
      }));
      state.selectedId = null;

      if (data.style_description && typeof data.style_description === 'object') {
        const palette = data.style_description.color_palette || [];
        state.styleDescription.fields.forEach(f => {
          f.value = data.style_description[f.id] || '';
        });
        state.styleDescription.color_palette = [...palette];
      }

      DOM.hldInput.value = state.highLevelDescription;
      DOM.backgroundInput.value = state.background;
      syncAspectUI();
      resizeCanvas();
      renderAll(true);
    }

    function handlePasteState() {
      navigator.clipboard.readText()
        .then(text => {
          try {
            const data = JSON.parse(text);
            if (typeof data !== 'object' || data === null) throw new Error();
            if ('elements' in data || 'highLevelDescription' in data) {
              restoreState(data);
              flashBtn(DOM.pasteStateBtn, '✓ Pasted');
              return;
            }
            if ('high_level_description' in data || 'compositional_deconstruction' in data) {
              restoreFromGenerated(data);
              flashBtn(DOM.pasteStateBtn, '✓ Pasted');
              return;
            }
            throw new Error();
          } catch (_) {
            state.highLevelDescription = text;
            DOM.hldInput.value = text;
            renderAll(true);
            flashBtn(DOM.pasteStateBtn, '✓ Prompt pasted');
          }
        })
        .catch(() => {
          flashBtn(DOM.pasteStateBtn, '✗ Paste failed');
        });
    }
  </script>
</body>
</html>
