<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ideogram4-PromptEditor</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Viewport lock */
    body, html {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    /* Premium dark blueprint layout pattern */
    .blueprint-bg {
      background-color: #020617; /* Slate-950 */
      background-image: radial-gradient(#1e293b 1.5px, transparent 1.5px); /* Slate-800 */
      background-size: 20px 20px;
    }
    /* Sleek scrollbar styling for sidebars */
    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #1e293b; /* Slate-800 */
      border-radius: 3px;
    }
    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: #334155; /* Slate-700 */
    }
    /* Professional multi-directional resize handles */
    .resize-handle {
      position: absolute;
      z-index: 50;
      pointer-events: auto;
    }
    .resize-handle-n  { cursor: ns-resize;    top: -4px;    left: 50%; transform: translateX(-50%); width: 24px; height: 8px; background: #6366f1; border-radius: 4px; }
    .resize-handle-s  { cursor: ns-resize;    bottom: -4px; left: 50%; transform: translateX(-50%); width: 24px; height: 8px; background: #6366f1; border-radius: 4px; }
    .resize-handle-e  { cursor: ew-resize;    right: -4px;  top: 50%;  transform: translateY(-50%); width: 8px;  height: 24px; background: #6366f1; border-radius: 4px; }
    .resize-handle-w  { cursor: ew-resize;    left: -4px;   top: 50%;  transform: translateY(-50%); width: 8px;  height: 24px; background: #6366f1; border-radius: 4px; }
    .resize-handle-nw { cursor: nwse-resize;  top: -5px;    left: -5px;  width: 10px; height: 10px; background: #6366f1; border-radius: 2px; }
    .resize-handle-ne { cursor: nesw-resize;  top: -5px;    right: -5px; width: 10px; height: 10px; background: #6366f1; border-radius: 2px; }
    .resize-handle-sw { cursor: nesw-resize;  bottom: -5px; left: -5px;  width: 10px; height: 10px; background: #6366f1; border-radius: 2px; }
    .resize-handle-se { cursor: nwse-resize;  bottom: -5px; right: -5px; width: 10px; height: 10px; background: #6366f1; border-radius: 2px; }
    /* Corner handle grab indicator */
    .resize-handle-se::after {
      content: ''; position: absolute; bottom: 1px; right: 1px;
      width: 6px; height: 6px;
      background: linear-gradient(135deg, transparent 40%, #fff 40%, #fff 55%, transparent 55%, transparent 70%, #fff 70%, #fff 80%, transparent 80%);
      opacity: 0.8;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 flex flex-col h-screen select-none">

  <!-- Header Section -->
  <header class="bg-slate-950 border-b border-slate-800 h-14 min-h-[56px] px-6 flex items-center justify-between z-30">
    <div class="flex items-center gap-3">
      <div class="p-1.5 bg-indigo-600 rounded-lg text-white shadow-lg shadow-indigo-600/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
        </svg>
      </div>
      <div>
        <h1 class="text-sm font-bold text-white tracking-wide">Ideogram4-PromptEditor</h1>
        <p class="text-[10px] text-slate-400">Strict JSON Prompt & Grid Modeler</p>
      </div>
    </div>

    <!-- Undo & Redo Header Controls -->
    <div class="flex items-center gap-4">
      <div class="flex items-center bg-slate-900 p-0.5 rounded-lg border border-slate-800 gap-0.5 shadow-inner">
        <button id="undo-btn" class="p-1.5 rounded hover:bg-slate-800 text-slate-300 disabled:opacity-30 disabled:hover:bg-transparent transition" title="Undo (Ctrl+Z)">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
          </svg>
        </button>
        <button id="redo-btn" class="p-1.5 rounded hover:bg-slate-800 text-slate-300 disabled:opacity-30 disabled:hover:bg-transparent transition" title="Redo (Ctrl+Y or Ctrl+Shift+Z)">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6" />
          </svg>
        </button>
      </div>

      <div class="h-4 w-[1px] bg-slate-800"></div>

      <!-- Mode Selector -->
      <!-- Aspect Ratio Selection & Custom Input -->
      <div class="flex items-center gap-2">
        <span class="text-[10px] font-bold tracking-wider text-slate-400 uppercase">Ratio:</span>
        <select id="aspect-ratio-selector" class="bg-slate-900 border border-slate-800 text-slate-200 text-xs font-semibold rounded px-2 py-1 outline-none focus:ring-1 focus:ring-indigo-500">
          <option value="16:9">16:9 (Landscape)</option>
          <option value="9:16">9:16 (Portrait)</option>
          <option value="1:1">1:1 (Square)</option>
          <option value="4:5">4:5 (Standard Tall)</option>
          <option value="3:4" selected>3:4 (Magazine)</option>
          <option value="2:3">2:3 (Book Cover)</option>
          <option value="21:9">21:9 (Cinema)</option>
          <option value="custom">Custom...</option>
        </select>

        <!-- Custom Ratio Dimension Inputs -->
        <div id="custom-ratio-container" class="hidden flex items-center gap-1 bg-slate-900 border border-slate-800 rounded px-2 py-0.5 shadow-inner">
          <input type="number" id="custom-ratio-w" min="1" max="100" class="w-10 bg-transparent text-slate-200 text-xs font-bold outline-none text-center [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" placeholder="W" value="3">
          <span class="text-slate-600 text-xs font-bold">:</span>
          <input type="number" id="custom-ratio-h" min="1" max="100" class="w-10 bg-transparent text-slate-200 text-xs font-bold outline-none text-center [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" placeholder="H" value="4">
        </div>
      </div>
    </div>
  </header>

  <!-- Main Three-Column Workspace -->

    <!-- LEFT COLUMN: Workspace Inputs & Layers -->
    <section class="w-[360px] min-w-[360px] max-w-[360px] bg-slate-900 border-r border-slate-800 h-full flex flex-col z-20 shadow-sm">

      <!-- Scrollable Tab panels -->
      <div class="flex-1 overflow-y-auto p-4 custom-scroll space-y-4">
        
        <!-- Tab 1: Global Information -->
        <div id="tab-global-panel" class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">High Level Description</label>
            <textarea id="hld-input" rows="3" class="w-full text-xs bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-2 outline-none focus:border-indigo-500 transition leading-relaxed placeholder-slate-600" placeholder="Summarize the core layout composition..."></textarea>

            <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">Background Details</label>
            <textarea id="background-input" rows="3" class="w-full text-xs bg-slate-950 border border-slate-800 text-slate-100 rounded-lg px-3 py-2 outline-none focus:border-indigo-500 transition leading-relaxed placeholder-slate-600" placeholder="Finished texture and details of background shell..."></textarea>

          </div>
          <div id="elements-list" class="space-y-3">
            <!-- Layers cards rendered via JS -->
          </div>

    <!-- CENTER COLUMN: Visual Canvas Board -->

        <!-- Live Layout Preset Selector -->

          <option value="clean">🧹 Clean Canvas</option>

          <option value="vintage">📜 Vintage Nostalgia</option>

          <option value="nature">🌿 Natural Serenity</option>

        <span class="h-3 w-[1px] bg-slate-800"></span>
        <button id="canvas-deselect-btn" class="text-xs font-semibold text-slate-400 hover:text-slate-200 transition">
          Clear Selection

        <span class="h-3 w-[1px] bg-slate-800"></span>
        <button id="snap-toggle-btn" class="text-xs font-bold transition flex items-center gap-1.5 px-2 py-1 rounded" title="Toggle snap to grid">

        <span class="h-3 w-[1px] bg-slate-800"></span>
        <div class="flex items-center gap-0.5">
          <span class="text-[9px] font-bold text-slate-500 uppercase mr-1">Align</span>
          <button id="align-left-btn" class="align-btn p-1.5 rounded text-slate-400 hover:text-white hover:bg-slate-800 transition" title="Align left">

          </button>

            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 4h12M6 9h10M6 14h7"/></svg>
          </button>
          <button id="align-center-v-btn" class="align-btn p-1.5 rounded text-slate-400 hover:text-white hover:bg-slate-800 transition" title="Center vertically">

          </button>
          <button id="align-bottom-btn" class="align-btn p-1.5 rounded text-slate-400 hover:text-white hover:bg-slate-800 transition" title="Align bottom">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 8h7M6 14h10M6 20h12"/></svg>

          <input id="align-offset-input" type="number" min="0" max="500" value="0" class="w-12 text-[10px] bg-slate-950 border border-slate-800 rounded px-1.5 py-1 text-slate-300 focus:border-indigo-500 outline-none text-center font-mono" title="Offset from canvas edge">
        </div>
      </div>

      <!-- Scaled Workspace Draft Board -->
      <div id="canvas-wrapper" class="w-full h-full flex flex-col items-center justify-center p-16 overflow-hidden">
        <div id="canvas-area" class="canvas-container bg-slate-900 shadow-2xl relative border border-slate-800 rounded-lg">
          <svg id="snap-overlay" class="absolute inset-0 pointer-events-none z-30" viewBox="0 0 1000 1000" style="width:100%;height:100%"></svg>
        </div>
        <!-- Real-time dynamic scale monitor -->
        <div id="canvas-resolution" class="text-[10px] text-slate-500 font-mono mt-3 select-none">0 × 0px</div>

    <!-- RIGHT COLUMN: Output Generator -->
    <section class="w-[340px] min-w-[340px] max-w-[340px] bg-slate-900 border-l border-slate-800 h-full flex flex-col z-20 shadow-sm">
      <div class="p-4 border-b border-slate-800 flex items-center justify-between bg-slate-950">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
          <span class="text-xs font-bold uppercase tracking-wider text-slate-300">Generation Code</span>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-[10px] text-slate-400 flex items-center gap-1 cursor-pointer select-none">
            <input type="checkbox" id="minify-toggle" checked class="rounded border-slate-800 text-indigo-600 focus:ring-indigo-500 bg-slate-900">
            Minify
          </label>
        </div>
      </div>

      <div class="flex-1 p-4 flex flex-col gap-4 overflow-hidden">
        <textarea id="json-output" readonly class="flex-1 w-full text-[11px] font-mono bg-slate-950 text-emerald-400 border border-slate-850 rounded-xl p-4 focus:outline-none resize-none leading-relaxed custom-scroll" placeholder="Building strict JSON output..."></textarea>
        
        <button id="copy-btn" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-sm rounded-xl shadow-lg shadow-indigo-950 transition flex items-center justify-center gap-2">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
          </svg>
          Copy Code Configuration

      </div>

  </main>

  <!-- Interactive JavaScript Controller -->
  <script>
    const state = {

      aspectRatio: '3:4',
      activeTab: 'global', // 'global' or 'layers'
      highLevelDescription: '',
      styleDescription: {
        fields: [
          {id: 'aesthetics', label: 'Aesthetics', value: ''},
          {id: 'lighting', label: 'Lighting', value: ''},
          {id: 'photo', label: 'Photo Style', value: ''},
          {id: 'art_style', label: 'Art Style', value: ''},
          {id: 'medium', label: 'Medium', value: ''},
        ],
        color_palette: []
      },
      background: '',
      elements: [],
      selectedId: null
    };

    // --- SNAPPING SYSTEM ---
    const SNAP_THRESHOLD = 15;
    let snapEnabled = true;
    let snapLines = [];

    function getSnapCandidates(excludeId) {
      const xCands = new Set([0, 500, 1000]);
      const yCands = new Set([0, 500, 1000]);
      state.elements.forEach(el => {
        if (el.id === excludeId) return;
        xCands.add(el.x1);
        xCands.add(el.x2);
        xCands.add(Math.round((el.x1 + el.x2) / 2));
        yCands.add(el.y1);
        yCands.add(el.y2);
        yCands.add(Math.round((el.y1 + el.y2) / 2));
      });
      return { x: xCands, y: yCands };
    }

    function snapEdgesOnAxis(positions, candidates, axis, threshold) {
      let bestOffset = 0;
      let bestDist = threshold;
      let snappedTo = null;

      for (const pos of positions) {
        for (const cand of candidates) {
          const dist = Math.abs(pos - cand);
          if (dist < bestDist) {
            bestDist = dist;
            bestOffset = cand - pos;
            snappedTo = cand;
          }
        }
      }

      if (bestOffset !== 0 && snappedTo !== null && snappedTo !== 0 && snappedTo !== 1000) {
        const exists = snapLines.some(l => l.axis === axis && l.value === snappedTo);
        if (!exists) {
          snapLines.push({ axis, value: snappedTo });
        }
      }

      return bestOffset;
    }

    function applyDragSnap(activeId, x1, y1, x2, y2) {
      if (!snapEnabled) return { x1, y1, x2, y2 };

      snapLines = [];
      const candidates = getSnapCandidates(activeId);
      const cx = Math.round((x1 + x2) / 2);
      const cy = Math.round((y1 + y2) / 2);

      const dx = snapEdgesOnAxis([x1, x2, cx], candidates.x, 'x', SNAP_THRESHOLD);
      const dy = snapEdgesOnAxis([y1, y2, cy], candidates.y, 'y', SNAP_THRESHOLD);

      return { x1: x1 + dx, y1: y1 + dy, x2: x2 + dx, y2: y2 + dy };
    }

    function applyResizeSnap(activeId, x1, y1, x2, y2, dir) {
      if (!snapEnabled) return { x1, y1, x2, y2 };

      snapLines = [];
      const candidates = getSnapCandidates(activeId);

      let dx = 0;
      let dy = 0;

      if (dir.includes('e') || dir.includes('w')) {
        const xPositions = [];
        if (dir.includes('e')) xPositions.push(x2);
        if (dir.includes('w')) xPositions.push(x1);
        dx = snapEdgesOnAxis(xPositions, candidates.x, 'x', SNAP_THRESHOLD);
      }
      if (dir.includes('n') || dir.includes('s')) {
        const yPositions = [];
        if (dir.includes('s')) yPositions.push(y2);
        if (dir.includes('n')) yPositions.push(y1);
        dy = snapEdgesOnAxis(yPositions, candidates.y, 'y', SNAP_THRESHOLD);
      }

      if (dir.includes('e')) x2 += dx;
      if (dir.includes('w')) x1 += dx;
      if (dir.includes('s')) y2 += dy;
      if (dir.includes('n')) y1 += dy;

      return { x1, y1, x2, y2 };
    }

    function applyDrawSnap(activeId, x1, y1, x2, y2) {
      if (!snapEnabled) return { x1, y1, x2, y2 };

      snapLines = [];
      const candidates = getSnapCandidates(activeId);

      const dx1 = snapEdgesOnAxis([x1], candidates.x, 'x', SNAP_THRESHOLD);
      const dy1 = snapEdgesOnAxis([y1], candidates.y, 'y', SNAP_THRESHOLD);
      const dx2 = snapEdgesOnAxis([x2], candidates.x, 'x', SNAP_THRESHOLD);
      const dy2 = snapEdgesOnAxis([y2], candidates.y, 'y', SNAP_THRESHOLD);

      x1 += dx1;
      y1 += dy1;
      x2 += dx2;
      y2 += dy2;

      if (x1 > x2) { const t = x1; x1 = x2; x2 = t; }
      if (y1 > y2) { const t = y1; y1 = y2; y2 = t; }

      return { x1, y1, x2, y2 };
    }

    function renderSnapLines() {
      const svg = document.getElementById('snap-overlay');
      if (!svg) return;
      svg.innerHTML = '';
      snapLines.forEach(line => {
        const el = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        if (line.axis === 'x') {
          el.setAttribute('x1', line.value);
          el.setAttribute('y1', '0');
          el.setAttribute('x2', line.value);
          el.setAttribute('y2', '1000');
        } else {
          el.setAttribute('x1', '0');

        el.setAttribute('stroke-width', '1');
        el.setAttribute('stroke-dasharray', '4 3');
        el.setAttribute('opacity', '0.8');
        svg.appendChild(el);
      });

    function clearSnapLines() {
      snapLines = [];
      const svg = document.getElementById('snap-overlay');

    function alignElement(dir) {
      const el = state.elements.find(item => item.id === state.selectedId);
      if (!el) return;

      const width = el.x2 - el.x1;
      const height = el.y2 - el.y1;
      const offset = Math.max(0, Math.min(500, parseInt(DOM.alignOffsetInput.value, 10) || 0));

      switch (dir) {
        case 'left':
          el.x1 = offset; el.x2 = offset + width; break;
        case 'center-h':
          el.x1 = Math.round((1000 - width) / 2); el.x2 = el.x1 + width; break;
        case 'right':
          el.x1 = 1000 - offset - width; el.x2 = 1000 - offset; break;
        case 'top':
          el.y1 = offset; el.y2 = offset + height; break;
        case 'center-v':
          el.y1 = Math.round((1000 - height) / 2); el.y2 = el.y1 + height; break;
        case 'bottom':
          el.y1 = 1000 - offset - height; el.y2 = 1000 - offset; break;
      }

      renderAll(true);
    }

    // Global DOM Namespace Reference Cache to prevent redundant execution bugs
    const DOM = {};

    // --- UNDO / REDO HISTORY CONTROLLER ---
    const history = {
      stack: [],
      index: -1,
      save() {
        if (this.index < this.stack.length - 1) {
          this.stack = this.stack.slice(0, this.index + 1);
        }
        const copy = JSON.parse(JSON.stringify({
          aspectRatio: state.aspectRatio,
          activeTab: state.activeTab,
          highLevelDescription: state.highLevelDescription,
          styleDescription: state.styleDescription,
          background: state.background,
          elements: state.elements,
          selectedId: state.selectedId
        }));
        this.stack.push(copy);
        this.index++;
        this.updateButtons();
      },
      undo() {
        if (this.index > 0) {
          this.index--;
          this.restore();
        }
      },
      redo() {
        if (this.index < this.stack.length - 1) {
          this.index++;
          this.restore();
        }
      },
      restore() {
        const snap = this.stack[this.index];
        state.aspectRatio = snap.aspectRatio;
        state.activeTab = snap.activeTab;
        state.highLevelDescription = snap.highLevelDescription;
        state.styleDescription = JSON.parse(JSON.stringify(snap.styleDescription));
        state.background = snap.background;
        state.elements = JSON.parse(JSON.stringify(snap.elements));
        state.selectedId = snap.selectedId;

        // Restore dynamic inputs inside panels using verified DOM namespace
        DOM.hldInput.value = state.highLevelDescription;
        DOM.backgroundInput.value = state.background;
        // Sync aspect ratio layout view elements cleanly
        syncAspectUI();

        syncActiveTab(false);
        resizeCanvas();
        renderAll(false);
        this.updateButtons();
      },
      updateButtons() {
        DOM.undoBtn.disabled = this.index <= 0;
        DOM.redoBtn.disabled = this.index >= this.stack.length - 1;
      }
    };

    let debounceTimer = null;
    function debouncedSave() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        history.save();
        generateJSON();
      }, 350);
    }

    function generateId() {
      return 'el_' + Math.random().toString(36).substr(2, 9);

      elementsToCache.forEach(id => {

      DOM.backgroundInput.addEventListener('input', () => { state.background = DOM.backgroundInput.value; debouncedSave(); });

    // Interactive Tab Controller logic
    function syncActiveTab(saveHistory = true) {
      if (state.activeTab === 'global') {
        DOM.tabGlobalPanel.classList.remove('hidden');
        DOM.tabLayersPanel.classList.add('hidden');
        DOM.tabGlobalBtn.className = 'flex-1 py-3 text-xs font-bold border-b-2 border-indigo-600 text-indigo-400 bg-slate-900 transition flex items-center justify-center gap-2';
        DOM.tabLayersBtn.className = 'flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition flex items-center justify-center gap-2';
      } else {
        DOM.tabLayersPanel.classList.remove('hidden');
        DOM.tabGlobalPanel.classList.add('hidden');
        DOM.tabLayersBtn.className = 'flex-1 py-3 text-xs font-bold border-b-2 border-indigo-600 text-indigo-400 bg-slate-900 transition flex items-center justify-center gap-2';
        DOM.tabGlobalBtn.className = 'flex-1 py-3 text-xs font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition flex items-center justify-center gap-2';
      }
      if (saveHistory) {
        history.save();
      }
    }

    // Aspect scaling calculations for the Draft Board
    function resizeCanvas() {
      const rect = DOM.canvasWrapper.getBoundingClientRect();
      const padding = 32; 
      const maxW = rect.width - padding * 2;
      const maxH = rect.height - padding * 4; // Bounded for bottom info tag

      const [aspectW, aspectH] = state.aspectRatio.split(':').map(Number);
      const ratio = aspectW / aspectH;

      let w, h;
      if (maxW / maxH > ratio) {
        h = maxH;
        w = maxH * ratio;
      } else {
        w = maxW;
        h = maxW / ratio;
      }

      DOM.canvasArea.style.width = `${w}px`;
      DOM.canvasArea.style.height = `${h}px`;

      // Render physical resolution specs inside view
      if (DOM.canvasResolution) {
        DOM.canvasResolution.textContent = `${Math.round(w)} × ${Math.round(h)}px  (${state.aspectRatio})`;
      }
    }

    // Aspect Ratio UI synchronization manager
    function syncAspectUI() {
      const standardRatios = ['16:9', '9:16', '1:1', '4:5', '3:4', '2:3', '21:9'];
      if (standardRatios.includes(state.aspectRatio)) {
        DOM.aspectRatioSelector.value = state.aspectRatio;
        DOM.customRatioContainer.classList.add('hidden');
      } else {
        DOM.aspectRatioSelector.value = 'custom';
        DOM.customRatioContainer.classList.remove('hidden');
        const [w, h] = state.aspectRatio.split(':');
        DOM.customRatioW.value = w || '3';
        DOM.customRatioH.value = h || '4';
      }
    }

            { id: generateId(), type: 'obj', text: '', desc: 'Subject head and shoulders positioned in the center, with Rembrandt lighting on the face.', y1: 150, x1: 300, y2: 650, x2: 700, color_palette: ["#D4C5A9", "#4A4A4A"] },
            { id: generateId(), type: 'obj', text: '', desc: 'Neutral earth-tone clothing on the subject lower body, falling into the bottom.', y1: 650, x1: 300, y2: 900, x2: 700, color_palette: ["#8B7355"] },
            { id: generateId(), type: 'text', text: 'PORTRAIT', desc: 'Refined serif typography in the upper left area, subtle warm tone.', y1: 60, x1: 80, y2: 120, x2: 350, color_palette: ["#8B7355"] }
          ]
        }
      };

      const preset = prompts[selection];
      if (!preset) return;

      state.styleDescription = JSON.parse(JSON.stringify(preset.styleDescription));
      state.elements = preset.elements.map(el => ({ ...el, id: generateId() }));
      state.selectedId = null;

      if (selection === 'clean') {
        state.highLevelDescription = '';
        state.background = '';
      } else {
        state.highLevelDescription = preset.highLevelDescription;
        state.background = preset.background;
        if (preset.aspectRatio) state.aspectRatio = preset.aspectRatio;
      }

      // Sync views
      DOM.hldInput.value = state.highLevelDescription;
      DOM.backgroundInput.value = state.background;

      syncAspectUI();
      resizeCanvas();
      renderAll(true);

      // Reset selection state indicator
      DOM.presetSelector.value = "clean";
    }

    // Global Key Listener mapping (Delete / Backspace / CtrlZ / CtrlY / CtrlShiftZ)
    function handleGlobalKeydown(e) {
      const isZ = e.key.toLowerCase() === 'z';
      const isY = e.key.toLowerCase() === 'y';
      const isDelete = e.key === 'Delete' || e.key === 'Backspace';
      const hasMetaOrCtrl = e.ctrlKey || e.metaKey;

      // Don't intercept delete actions if currently focusing on input tags
      const activeTag = document.activeElement.tagName;
      const isTyping = activeTag === 'INPUT' || activeTag === 'TEXTAREA' || document.activeElement.isContentEditable;

      if (isTyping) {
        return; // Allow native text operations to execute
      }

      if (isDelete && state.selectedId) {
        e.preventDefault();
        state.elements = state.elements.filter(item => item.id !== state.selectedId);
        state.selectedId = null;
        renderAll(true);
      } else if (hasMetaOrCtrl && isZ) {
        e.preventDefault();
        if (e.shiftKey) {
          history.redo();
        } else {
          history.undo();
        }
      } else if (hasMetaOrCtrl && isY) {
        e.preventDefault();
        history.redo();
      }
    }

    // Toggle Custom inputs visibility depending on selector state
    function handleAspectChange(e) {
      const val = e.target.value;
      if (val === 'custom') {
        DOM.customRatioContainer.classList.remove('hidden');
        const w = DOM.customRatioW.value || '3';
        const h = DOM.customRatioH.value || '4';
        state.aspectRatio = `${w}:${h}`;
      } else {
        DOM.customRatioContainer.classList.add('hidden');
        state.aspectRatio = val;
      }
      resizeCanvas();
      history.save();
      generateJSON();
    }

    // Clamps, scales, and live-redraws custom numeric ratios on input typing
    function handleCustomRatioChange() {
      let w = parseInt(DOM.customRatioW.value) || 1;
      let h = parseInt(DOM.customRatioH.value) || 1;
      
      if (w < 1) w = 1;
      if (h < 1) h = 1;
      DOM.customRatioW.value = w;
      DOM.customRatioH.value = h;

      state.aspectRatio = `${w}:${h}`;
      resizeCanvas();
      debouncedSave(); // Use debounce to cleanly avoid history stacking while typing numbers
    }

    function handleAddElement() {
      const newEl = {

      state.elements.push(newEl);
      state.selectedId = newEl.id;
      
      state.activeTab = 'layers';
      syncActiveTab(false);

    }

    // Renders dynamic style description fields with editable titles
    const STYLE_FIELDS = [
      {key: 'aesthetics', label: 'Aesthetics', placeholder: 'Mood, vibe, artistic references...'},
      {key: 'lighting', label: 'Lighting', placeholder: 'Lighting description...'},

      {key: 'art_style', label: 'Art Style', placeholder: 'Illustration/painting style hint'},

    function migrateStyleDescription() {
      if (state.styleDescription.fields) return;
      const fields = [];
      STYLE_FIELDS.forEach(sf => {
        fields.push({

          value: state.styleDescription[sf.key] || ''
        });

      state.styleDescription.fields = fields;
      STYLE_FIELDS.forEach(sf => { delete state.styleDescription[sf.key]; });

    function renderCanvasBoxes() {
      const overlay = document.getElementById('snap-overlay');
      DOM.canvasArea.innerHTML = '';
      if (overlay) DOM.canvasArea.appendChild(overlay);

      if (state.elements.length === 0) {

        placeholder.className = 'absolute inset-0 flex flex-col items-center justify-center p-6 text-center text-slate-500 pointer-events-none select-none';

          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 mb-2 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />

          <span class="text-[10px] text-slate-600 mt-1 max-w-[200px] leading-relaxed">Click & drag here to draw a new zone, or load a prompt preset above.</span>
        `;
        DOM.canvasArea.appendChild(placeholder);
        return;
      }

      state.elements.forEach(el => {
        const isSelected = el.id === state.selectedId;
        const box = document.createElement('div');
        box.id = `box-${el.id}`;
        box.className = `absolute border ${isSelected ? 'border-indigo-500 bg-indigo-500/10 z-20 shadow-lg' : 'border-slate-700 bg-slate-900/40 z-10 hover:border-slate-500'}`;

        box.style.left = `${el.x1 / 10}%`;
        box.style.width = `${(el.x2 - el.x1) / 10}%`;
        box.style.height = `${(el.y2 - el.y1) / 10}%`;

        const tag = document.createElement('div');
        tag.className = `absolute top-1 left-1 px-1 py-0.5 rounded text-[8px] font-mono font-bold select-none pointer-events-none ${isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-850 text-slate-300'}`;
        tag.innerHTML = `<span class="coords-display opacity-60 text-[7px]">${el.type.toUpperCase()} ${el.y1},${el.x1}</span>`;
        box.appendChild(tag);

        // --- INLINE CANVAS EDITABLE INFORMATION ---
        const widthVal = el.x2 - el.x1;
        const heightVal = el.y2 - el.y1;
        const isLargeEnough = widthVal >= 180 && heightVal >= 120;

        if (isLargeEnough) {
          const inlineForm = document.createElement('div');

          objBtn.textContent = 'OBJ';
          const textBtn = document.createElement('button');
          textBtn.className = `px-1.5 py-0.5 rounded text-[9px] font-bold leading-none transition ${el.type === 'text' ? 'bg-indigo-600 text-white' : 'bg-slate-800 text-slate-400 hover:text-slate-200'}`;

            ev.stopPropagation();
            if (el.type !== 'text') { el.type = 'text'; renderAll(true); }
          });

          typeRow.appendChild(textBtn);

            textInputHTML = `
              <input type="text" class="inline-canvas-text w-full text-[10px] bg-slate-950 border border-slate-800 rounded px-1.5 py-0.5 text-slate-100 focus:border-indigo-500 outline-none" value="${el.text || ''}" placeholder="Literal content...">

          inlineForm.innerHTML = `
            ${textInputHTML}
            <textarea class="inline-canvas-desc w-full text-[10px] bg-slate-950 border border-slate-800 rounded px-1.5 py-0.5 text-slate-100 focus:border-indigo-500 outline-none resize-none leading-tight custom-scroll" placeholder="Desc..." rows="1">${el.desc || ''}</textarea>
          `;

          inlineForm.insertBefore(typeRow, inlineForm.firstChild);
          const colorRow = document.createElement('div');

            const dot = document.createElement('div');
            dot.className = 'w-3 h-3 rounded-full border border-white/20 shadow-sm cursor-pointer hover:ring-1 hover:ring-red-400/60 transition';
            dot.style.backgroundColor = color;
            dot.addEventListener('mousedown', (ev) => {
              ev.stopPropagation();
              el.color_palette.splice(idx, 1);
              renderAll(true);
            });
            colorRow.appendChild(dot);
          });
          if ((el.color_palette || []).length < 5) {
            const addWrap = document.createElement('div');
            addWrap.className = 'relative w-3.5 h-3.5';
            addWrap.innerHTML = '<span class="absolute inset-0 rounded-full border border-dashed border-slate-600 flex items-center justify-center text-[7px] text-slate-400 pointer-events-none">+</span>';

              if (el.color_palette.length < 5) {

                renderAll(true);
              }
            });
            addWrap.appendChild(colorInput);
            colorRow.appendChild(addWrap);
          }
          inlineForm.appendChild(colorRow);

          // Bind mouse event limits to ensure inline input typing doesn't drag the layout canvas elements
          const stopEvents = (ev) => { 
            ev.stopPropagation(); 
            selectElement(el.id); // Direct select element on editing interaction focus
          };
          
          const textIn = inlineForm.querySelector('.inline-canvas-text');
          const descIn = inlineForm.querySelector('.inline-canvas-desc');

          if (textIn) {
            textIn.addEventListener('mousedown', stopEvents);
            textIn.addEventListener('keydown', stopEvents);
            textIn.addEventListener('input', (e) => {
              el.text = e.target.value;
              // Sync directly to left properties card without reset focus
              const sidebarInput = document.querySelector(`#form-${el.id} .text-val-input`);
              if (sidebarInput) sidebarInput.value = el.text;
              debouncedSave();
            });

          if (descIn) {
            descIn.addEventListener('mousedown', stopEvents);
            descIn.addEventListener('keydown', stopEvents);
            descIn.addEventListener('input', (e) => {
              el.desc = e.target.value;
              // Sync directly to properties details field without reset focus
              const sidebarDesc = document.querySelector(`#form-${el.id} .desc-val-input`);
              if (sidebarDesc) sidebarDesc.value = el.desc;
              debouncedSave();

          }

          box.appendChild(inlineForm);
        }

        if (isSelected) {
          ['n','s','e','w','nw','ne','se','sw'].forEach(dir => {
            const rh = document.createElement('div');
            rh.className = `resize-handle resize-handle-${dir}`;
            rh.dataset.dir = dir;
            rh.addEventListener('mousedown', (e) => handleResizeMouseDown(e, el.id));
            box.appendChild(rh);
          });
        }

        box.addEventListener('mousedown', (e) => {
          if (e.target.closest('.resize-handle')) return;
          handleDragMouseDown(e, el.id);
        });

        DOM.canvasArea.appendChild(box);
      });
    }

    // Fully optimized, focus-safe box selection pipeline
    function selectElement(id) {
      if (state.selectedId === id) return; // Already selected, ignore to maintain focused inputs
      
      state.selectedId = id;
      
      // 1. Manually update style sheets and inject 8 directional resize handles to the target box
      document.querySelectorAll('[id^="box-"]').forEach(boxEl => {
        const boxId = boxEl.id.replace('box-', '');
        if (boxId === id) {
          boxEl.className = 'absolute border border-indigo-500 bg-indigo-500/10 z-20 shadow-lg';
          
          if (!boxEl.querySelector('.resize-handle')) {
            ['n','s','e','w','nw','ne','se','sw'].forEach(dir => {
              const rh = document.createElement('div');
              rh.className = `resize-handle resize-handle-${dir}`;
              rh.dataset.dir = dir;
              rh.addEventListener('mousedown', (e) => handleResizeMouseDown(e, boxId));
              boxEl.appendChild(rh);
            });
          }
        } else {
          boxEl.className = 'absolute border border-slate-700 bg-slate-900/40 z-10 hover:border-slate-500';
          boxEl.querySelectorAll('.resize-handle').forEach(rh => rh.remove());
        }
      });

      // 2. Refresh properties card classes in sidebar
      document.querySelectorAll('[id^="form-"]').forEach(el => {
        el.className = 'p-4 rounded-xl border transition border-slate-850 bg-slate-950/50';
      });
      const activeForm = document.getElementById(`form-${id}`);
      if (activeForm) {
        activeForm.className = 'p-4 rounded-xl border transition border-indigo-500 bg-indigo-500/10 ring-1 ring-indigo-500';
        activeForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }

      // 3. Automatically snap tab selector directly to Layer list on direct click select
      if (state.activeTab !== 'layers') {
        state.activeTab = 'layers';
        syncActiveTab(false);
      }
    }

    let activeAction = null; 
    let activeDirection = null; // for resize: 'n','s','e','w','ne','nw','se','sw'
    let currentElementId = null;
    let initialX = 0, initialY = 0;
    let rectBounds = null;
    let initialBoxCoords = {};

    function handleCanvasMouseDown(e) {
      if (e.target !== DOM.canvasArea) return; 
      e.preventDefault();

      activeAction = 'drawing';
      rectBounds = DOM.canvasArea.getBoundingClientRect();
      
      const clickX = ((e.clientX - rectBounds.left) / rectBounds.width) * 1000;
      const clickY = ((e.clientY - rectBounds.top) / rectBounds.height) * 1000;

      const newId = generateId();
      const newEl = {
        id: newId,
        type: 'obj',
        text: '',
        desc: 'Custom drag drawn element',
        y1: Math.round(clickY),
        x1: Math.round(clickX),
        y2: Math.round(clickY),
        x2: Math.round(clickX),
        color_palette: []
      };

      state.elements.push(newEl);
      state.selectedId = newId;
      currentElementId = newId;
      initialBoxCoords = { x1: newEl.x1, y1: newEl.y1, x2: newEl.x2, y2: newEl.y2 };

      document.addEventListener('mousemove', handleGlobalMouseMove);
      document.addEventListener('mouseup', handleGlobalMouseUp);
    }

    function handleDragMouseDown(e, id) {
      e.preventDefault();
      e.stopPropagation();
      selectElement(id);

      activeAction = 'dragging';
      currentElementId = id;
      rectBounds = DOM.canvasArea.getBoundingClientRect();

      initialX = e.clientX;
      initialY = e.clientY;

      const el = state.elements.find(item => item.id === id);
      initialBoxCoords = { ...el };

      document.addEventListener('mousemove', handleGlobalMouseMove);
      document.addEventListener('mouseup', handleGlobalMouseUp);
    }

    function handleResizeMouseDown(e, id) {
      e.preventDefault();
      e.stopPropagation();

      activeAction = 'resizing';
      activeDirection = e.target.dataset.dir || 'se';
      currentElementId = id;
      rectBounds = DOM.canvasArea.getBoundingClientRect();

      initialX = e.clientX;
      initialY = e.clientY;

      const el = state.elements.find(item => item.id === id);
      initialBoxCoords = { ...el };

      document.addEventListener('mousemove', handleGlobalMouseMove);
      document.addEventListener('mouseup', handleGlobalMouseUp);
    }

    function handleGlobalMouseMove(e) {
      if (!activeAction || !currentElementId) return;

      const el = state.elements.find(item => item.id === currentElementId);
      if (!el) return;

      const deltaX = ((e.clientX - initialX) / rectBounds.width) * 1000;
      const deltaY = ((e.clientY - initialY) / rectBounds.height) * 1000;

      if (activeAction === 'drawing') {
        const mouseX = ((e.clientX - rectBounds.left) / rectBounds.width) * 1000;
        const mouseY = ((e.clientY - rectBounds.top) / rectBounds.height) * 1000;

        const anchorX = initialBoxCoords.x1;
        const anchorY = initialBoxCoords.y1;

        let newX1 = Math.round(Math.min(anchorX, mouseX));
        let newY1 = Math.round(Math.min(anchorY, mouseY));
        let newX2 = Math.round(Math.max(anchorX, mouseX));
        let newY2 = Math.round(Math.max(anchorY, mouseY));

        if (snapEnabled) {
          const snapped = applyDrawSnap(el.id, newX1, newY1, newX2, newY2);
          newX1 = snapped.x1; newY1 = snapped.y1;
          newX2 = snapped.x2; newY2 = snapped.y2;
        }

        el.x1 = Math.max(0, Math.min(1000, newX1));
        el.y1 = Math.max(0, Math.min(1000, newY1));
        el.x2 = Math.max(0, Math.min(1000, newX2));
        el.y2 = Math.max(0, Math.min(1000, newY2));

        renderSnapLines();
      } 
      else if (activeAction === 'dragging') {
        const width = initialBoxCoords.x2 - initialBoxCoords.x1;
        const height = initialBoxCoords.y2 - initialBoxCoords.y1;

        let newX1 = Math.round(initialBoxCoords.x1 + deltaX);
        let newY1 = Math.round(initialBoxCoords.y1 + deltaY);

        if (snapEnabled) {
          const snapped = applyDragSnap(el.id, newX1, newY1, newX1 + width, newY1 + height);
          newX1 = snapped.x1;
          newY1 = snapped.y1;
        }

        if (newX1 < 0) newX1 = 0;
        if (newY1 < 0) newY1 = 0;
        if (newX1 + width > 1000) newX1 = 1000 - width;
        if (newY1 + height > 1000) newY1 = 1000 - height;

        el.x1 = newX1;
        el.y1 = newY1;
        el.x2 = newX1 + width;
        el.y2 = newY1 + height;

        renderSnapLines();
      } 
      else if (activeAction === 'resizing') {
        const dir = activeDirection;
        let {x1, y1, x2, y2} = initialBoxCoords;
        const minSize = 30;

        // Apply delta to the appropriate edges
        if (dir.includes('e')) x2 = Math.round(initialBoxCoords.x2 + deltaX);
        if (dir.includes('w')) x1 = Math.round(initialBoxCoords.x1 + deltaX);
        if (dir.includes('s')) y2 = Math.round(initialBoxCoords.y2 + deltaY);
        if (dir.includes('n')) y1 = Math.round(initialBoxCoords.y1 + deltaY);

        // Apply snapping
        if (snapEnabled) {
          const snapped = applyResizeSnap(el.id, x1, y1, x2, y2, dir);
          x1 = snapped.x1; y1 = snapped.y1; x2 = snapped.x2; y2 = snapped.y2;
        }

        // Enforce min size and canvas bounds
        if (x2 - x1 < minSize) {
          if (dir.includes('e')) x2 = x1 + minSize;
          else x1 = x2 - minSize;
        }
        if (y2 - y1 < minSize) {
          if (dir.includes('s')) y2 = y1 + minSize;
          else y1 = y2 - minSize;
        }
        x1 = Math.max(0, Math.min(1000, x1));
        y1 = Math.max(0, Math.min(1000, y1));
        x2 = Math.max(0, Math.min(1000, x2));
        y2 = Math.max(0, Math.min(1000, y2));
        // Re-enforce min after clamping
        if (x2 - x1 < minSize) {
          if (dir.includes('e')) x2 = Math.min(1000, x1 + minSize);
          else x1 = Math.max(0, x2 - minSize);
        }
        if (y2 - y1 < minSize) {
          if (dir.includes('s')) y2 = Math.min(1000, y1 + minSize);
          else y1 = Math.max(0, y2 - minSize);
        }

        el.x1 = x1; el.y1 = y1; el.x2 = x2; el.y2 = y2;

        renderSnapLines();
      }

      const visualBox = document.getElementById(`box-${el.id}`);
      if (visualBox) {
        visualBox.style.top = `${el.y1 / 10}%`;
        visualBox.style.left = `${el.x1 / 10}%`;
        visualBox.style.width = `${(el.x2 - el.x1) / 10}%`;
        visualBox.style.height = `${(el.y2 - el.y1) / 10}%`;
        
        const coordsDisp = visualBox.querySelector('.coords-display');
        if (coordsDisp) {
          coordsDisp.textContent = `[${el.y1}, ${el.x1}]`;
        }
      }

    }

    function handleGlobalMouseUp() {
      clearSnapLines();
      let isChanged = false;
      if (activeAction === 'drawing') {
        const el = state.elements.find(item => item.id === currentElementId);
        if (el && (el.x2 - el.x1 < 10 || el.y2 - el.y1 < 10)) {
          state.elements = state.elements.filter(item => item.id !== el.id);
          state.selectedId = null;
        } else {
          isChanged = true;
          state.activeTab = 'layers';
          syncActiveTab(false);
        }
      } else if (activeAction === 'dragging' || activeAction === 'resizing') {
        const el = state.elements.find(item => item.id === currentElementId);
        if (el && (el.x1 !== initialBoxCoords.x1 || el.y1 !== initialBoxCoords.y1 || el.x2 !== initialBoxCoords.x2 || el.y2 !== initialBoxCoords.y2)) {
          isChanged = true;
        }
      }

      activeAction = null;
      activeDirection = null;
      currentElementId = null;
      document.removeEventListener('mousemove', handleGlobalMouseMove);
      document.removeEventListener('mouseup', handleGlobalMouseUp);
      
      renderAll(isChanged); 
    }

    function generateJSON() {
      function buildElement(el) {
        const e = { type: el.type };
        if (el.type === 'text') {
          e.text = el.text || '';
        }
        e.bbox = [el.y1, el.x1, el.y2, el.x2];
        e.desc = el.desc;
        if (el.color_palette && el.color_palette.length > 0) {
          e.color_palette = el.color_palette;
        }
        return e;
      }

      const fieldVals = {};
      if (state.styleDescription.fields) {
        state.styleDescription.fields.forEach(f => { fieldVals[f.id] = f.value; });
      } else {
        STYLE_FIELDS.forEach(sf => { fieldVals[sf.key] = state.styleDescription[sf.key] || ''; });
      }
      const sd = {
        aesthetics: fieldVals.aesthetics || '',
        lighting: fieldVals.lighting || '',
        medium: fieldVals.medium || ''
      };
      if (fieldVals.art_style) sd.art_style = fieldVals.art_style;
      if (fieldVals.photo) sd.photo = fieldVals.photo;
      sd.color_palette = state.styleDescription.color_palette;

      const outputStructure = {
        high_level_description: state.highLevelDescription,
        style_description: sd,
        compositional_deconstruction: {
          background: state.background,
          elements: state.elements.map(buildElement)
        }
      };

      const isMinified = DOM.minifyToggle.checked;
      DOM.jsonOutput.value = isMinified 
        ? JSON.stringify(outputStructure) 
        : JSON.stringify(outputStructure, null, 2);
    }

    function handleCopyJSON() {
      DOM.jsonOutput.select();
      navigator.clipboard.writeText(DOM.jsonOutput.value)
        .then(() => {
          const originalText = DOM.copyBtn.innerHTML;
          DOM.copyBtn.innerHTML = '✓ Copied Configuration';
          DOM.copyBtn.classList.replace('bg-indigo-600', 'bg-green-600');
          setTimeout(() => {
            DOM.copyBtn.innerHTML = originalText;
            DOM.copyBtn.classList.replace('bg-green-600', 'bg-indigo-600');
          }, 2000);
        })
        .catch(() => {
          DOM.jsonOutput.select();
          document.execCommand('copy');
        });
    }
  </script>
</body>
